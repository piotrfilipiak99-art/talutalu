databases:
  - name: talutalu-db
    plan: free
    databaseName: talutalu
    user: talutalu

services:
  - type: web
    name: talutalu-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: talutalu-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false # set manually in the Render dashboard
      - key: PYTHON_VERSION
        value: 3.13.4

  - type: web
    name: talutalu
    runtime: static
    buildCommand: |
      git clone https://github.com/flutter/flutter.git --depth 1 -b stable flutter-sdk
      ./flutter-sdk/bin/flutter --version
      ./flutter-sdk/bin/flutter build web --release
    staticPublishPath: build/web
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
