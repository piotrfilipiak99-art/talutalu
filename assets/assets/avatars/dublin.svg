<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#1A6A1A"/>
  <!-- Dublin Castle / Trinity College Book of Kells style -->
  <!-- Main castle tower -->
  <rect x="34" y="30" width="32" height="46" fill="white"/>
  <!-- Battlements (merlons) on top -->
  <rect x="34" y="22" width="6" height="8" fill="white"/>
  <rect x="42" y="22" width="6" height="8" fill="white"/>
  <rect x="50" y="22" width="6" height="8" fill="white"/>
  <rect x="58" y="22" width="6" height="8" fill="white"/>
  <!-- Corner turrets -->
  <rect x="26" y="40" width="10" height="24" fill="white"/>
  <rect x="26" y="34" width="10" height="8" fill="white"/>
  <polygon points="26,34 36,34 31,26" fill="white"/>
  <rect x="64" y="40" width="10" height="24" fill="white"/>
  <rect x="64" y="34" width="10" height="8" fill="white"/>
  <polygon points="64,34 74,34 69,26" fill="white"/>
  <!-- Gate arch -->
  <rect x="42" y="58" width="16" height="18" fill="#1A6A1A"/>
  <ellipse cx="50" cy="58" rx="8" ry="6" fill="#1A6A1A"/>
  <!-- Clock face -->
  <circle cx="50" cy="44" r="6" fill="#1A6A1A"/>
  <circle cx="50" cy="44" r="5" fill="white" opacity="0.2"/>
  <!-- Base -->
  <rect x="20" y="76" width="60" height="4" fill="white"/>
</svg>
