<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#1A3A1A"/>
  <!-- Mokorotlo (Basotho hat) — national symbol of Lesotho, also atop the flag -->
  <!-- The distinctive conical straw hat with central spike -->
  <!-- Wide brim of hat -->
  <ellipse cx="50" cy="70" rx="42" ry="10" fill="white"/>
  <!-- Hat body (frustum / truncated cone) -->
  <polygon points="14,70 30,36 70,36 86,70" fill="white"/>
  <!-- Conical top section -->
  <polygon points="30,36 50,18 70,36" fill="white"/>
  <!-- Woven straw texture rings (bands) -->
  <ellipse cx="50" cy="52" rx="28" ry="5" fill="#1A3A1A" opacity="0.15"/>
  <ellipse cx="50" cy="42" rx="20" ry="4" fill="#1A3A1A" opacity="0.15"/>
  <ellipse cx="50" cy="34" rx="12" ry="3" fill="#1A3A1A" opacity="0.15"/>
  <!-- Central spike/knot on top -->
  <polygon points="46,18 50,6 54,18" fill="white"/>
  <circle cx="50" cy="6" r="3" fill="white"/>
  <!-- Brim shadow suggestion -->
  <ellipse cx="50" cy="70" rx="34" ry="6" fill="#1A3A1A" opacity="0.1"/>
  <!-- Ground -->
  <rect x="8" y="80" width="84" height="4" fill="white" opacity="0.2"/>
</svg>
