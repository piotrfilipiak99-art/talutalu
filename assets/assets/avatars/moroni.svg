<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#1A5A3A"/>
  <!-- Old Friday Mosque (Ancienne Mosquée du Vendredi), Moroni, Comoros -->
  <!-- Distinctive style: Arab-African with square minaret and carved woodwork -->
  <!-- Main mosque building -->
  <rect x="18" y="50" width="64" height="32" fill="white"/>
  <!-- Flat parapet with battlements -->
  <rect x="16" y="44" width="68" height="10" fill="white"/>
  <rect x="16" y="38" width="8" height="8" fill="white"/>
  <rect x="26" y="38" width="8" height="8" fill="white"/>
  <rect x="60" y="38" width="8" height="8" fill="white"/>
  <rect x="70" y="38" width="8" height="8" fill="white"/>
  <!-- Square minaret (characteristic of Comoros mosques) -->
  <rect x="36" y="14" width="28" height="38" fill="white"/>
  <!-- Decorative bands on minaret -->
  <rect x="34" y="22" width="32" height="3" fill="#1A5A3A" opacity="0.3"/>
  <rect x="34" y="32" width="32" height="3" fill="#1A5A3A" opacity="0.3"/>
  <rect x="34" y="42" width="32" height="3" fill="#1A5A3A" opacity="0.3"/>
  <!-- Minaret top with crenellations -->
  <rect x="34" y="8" width="8" height="8" fill="white"/>
  <rect x="44" y="8" width="8" height="8" fill="white"/>
  <rect x="54" y="8" width="8" height="8" fill="white"/>
  <!-- Crescent and star on top -->
  <circle cx="50" cy="6" r="3" fill="#1A5A3A"/>
  <circle cx="52" cy="5" r="2.5" fill="white"/>
  <!-- Arched doorway with carved frame -->
  <rect x="41" y="60" width="18" height="22" fill="#1A5A3A"/>
  <ellipse cx="50" cy="60" rx="9" ry="8" fill="#1A5A3A"/>
  <!-- Lattice windows (mashrabiya) -->
  <rect x="20" y="54" width="10" height="10" fill="#1A5A3A" opacity="0.4"/>
  <rect x="70" y="54" width="10" height="10" fill="#1A5A3A" opacity="0.4"/>
</svg>
