<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#1A3A7A"/>
  <!-- Fortaleza Real de São Filipe, Praia, Cape Verde — clifftop Portuguese fort -->
  <!-- Cliff/plateau (Plateau district of Praia) -->
  <polygon points="8,88 8,58 20,48 80,48 92,58 92,88" fill="white" opacity="0.25"/>
  <!-- Fort walls on cliff top -->
  <rect x="18" y="30" width="64" height="22" fill="white"/>
  <!-- Battlements/merlons -->
  <rect x="18" y="24" width="8" height="8" fill="white"/>
  <rect x="28" y="24" width="8" height="8" fill="white"/>
  <rect x="38" y="24" width="8" height="8" fill="white"/>
  <rect x="48" y="24" width="8" height="8" fill="white"/>
  <rect x="58" y="24" width="8" height="8" fill="white"/>
  <rect x="68" y="24" width="8" height="8" fill="white"/>
  <!-- Corner tower left -->
  <rect x="10" y="22" width="14" height="32" fill="white"/>
  <rect x="8" y="16" width="18" height="8" fill="white"/>
  <!-- Corner tower right -->
  <rect x="76" y="22" width="14" height="32" fill="white"/>
  <rect x="74" y="16" width="18" height="8" fill="white"/>
  <!-- Flagpole -->
  <rect x="48" y="8" width="3" height="20" fill="white"/>
  <!-- Gate -->
  <rect x="42" y="38" width="16" height="14" fill="#1A3A7A"/>
  <ellipse cx="50" cy="38" rx="8" ry="7" fill="#1A3A7A"/>
  <!-- Atlantic Ocean below cliff -->
  <rect x="8" y="82" width="84" height="10" fill="white" opacity="0.2"/>
</svg>
