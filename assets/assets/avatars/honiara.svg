<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#003A6A"/>
  <!-- National Parliament, Honiara, Solomon Islands — traditional style with nguzu nguzu prow figure -->
  <!-- Nguzu nguzu (war canoe prow figure) — the iconic symbol of Solomon Islands -->
  <!-- Stylized war canoe (tomoko) with nguzu nguzu -->
  <!-- Canoe hull -->
  <path d="M 6,64 Q 15,56 50,54 Q 85,56 94,64 Q 85,72 50,74 Q 15,72 6,64 Z" fill="white"/>
  <!-- Carved prow rising up (nguzu nguzu figure) -->
  <!-- Prow post curving up and forward -->
  <path d="M 6,64 Q 2,50 10,38 Q 18,28 22,40 Q 18,48 10,56" fill="white"/>
  <!-- Nguzu nguzu figure head on prow -->
  <circle cx="10" cy="36" r="7" fill="white"/>
  <!-- Ornamental face of nguzu nguzu -->
  <circle cx="8" cy="34" r="1.5" fill="#003A6A" opacity="0.5"/>
  <circle cx="12" cy="34" r="1.5" fill="#003A6A" opacity="0.5"/>
  <!-- Stern post curving up -->
  <path d="M 94,64 Q 98,52 90,44 Q 82,36 80,48 Q 84,56 90,62" fill="white"/>
  <!-- Outrigger float -->
  <path d="M 16,74 Q 40,72 70,72 Q 76,74 70,76 Q 40,76 16,74 Z" fill="white" opacity="0.7"/>
  <!-- Outrigger booms -->
  <line x1="26" y1="68" x2="26" y2="74" stroke="white" stroke-width="3"/>
  <line x1="48" y1="67" x2="48" y2="74" stroke="white" stroke-width="3"/>
  <line x1="66" y1="67" x2="62" y2="74" stroke="white" stroke-width="3"/>
  <!-- Sail (traditional mat sail) -->
  <polygon points="50,54 42,20 60,40" fill="white"/>
  <rect x="48" y="20" width="4" height="36" fill="white"/>
  <!-- Parliament building on shore -->
  <rect x="20" y="46" width="60" height="10" fill="white" opacity="0.4"/>
  <polygon points="16,46 50,34 84,46" fill="white" opacity="0.5"/>
</svg>
