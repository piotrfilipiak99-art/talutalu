<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#4A1A5A"/>
  <!-- Monserrate Church, Bogotá - on a mountain above the city -->
  <!-- Andes mountain silhouette -->
  <polygon points="10,72 40,24 70,50 90,72" fill="white" opacity="0.25"/>
  <!-- Monserrate peak -->
  <polygon points="28,72 52,28 76,72" fill="white" opacity="0.3"/>
  <!-- Church on mountaintop -->
  <!-- Church body -->
  <rect x="36" y="42" width="28" height="28" fill="white"/>
  <!-- Bell tower (right) -->
  <rect x="60" y="26" width="12" height="18" fill="white"/>
  <polygon points="60,26 72,26 66,14" fill="white"/>
  <!-- Church facade -->
  <rect x="36" y="40" width="28" height="6" fill="white"/>
  <!-- Rose window -->
  <circle cx="50" cy="52" r="6" fill="#4A1A5A"/>
  <circle cx="50" cy="52" r="4" fill="white" opacity="0.2"/>
  <!-- Entry arch -->
  <rect x="44" y="60" width="12" height="10" fill="#4A1A5A"/>
  <ellipse cx="50" cy="60" rx="6" ry="5" fill="#4A1A5A"/>
  <!-- City valley below -->
  <rect x="10" y="78" width="80" height="6" fill="white" opacity="0.3"/>
  <rect x="10" y="76" width="80" height="2" fill="white"/>
</svg>
