<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#6A3A00"/>
  <!-- Roman Temple of Hercules, Amman Citadel -->
  <!-- Hill of the Citadel -->
  <polygon points="10,78 50,44 90,78" fill="white" opacity="0.3"/>
  <!-- Temple columns (only 2 remaining - iconic) -->
  <rect x="32" y="34" width="8" height="38" fill="white"/>
  <rect x="60" y="34" width="8" height="38" fill="white"/>
  <!-- Entablature fragments -->
  <rect x="30" y="28" width="16" height="6" fill="white"/>
  <rect x="58" y="28" width="16" height="6" fill="white"/>
  <!-- Pediment fragment (partial) -->
  <polygon points="30,28 46,28 38,18" fill="white" opacity="0.6"/>
  <!-- Capital decorations (square caps) -->
  <rect x="29" y="32" width="12" height="4" fill="white"/>
  <rect x="57" y="32" width="12" height="4" fill="white"/>
  <!-- Ruins on ground -->
  <rect x="18" y="70" width="20" height="4" fill="white" opacity="0.5"/>
  <rect x="62" y="72" width="18" height="3" fill="white" opacity="0.5"/>
  <!-- Fallen column drum -->
  <ellipse cx="26" cy="74" rx="8" ry="4" fill="white" opacity="0.4"/>
  <!-- Plinth / stylobate -->
  <rect x="20" y="72" width="60" height="6" fill="white"/>
  <!-- Hilltop base -->
  <rect x="10" y="78" width="80" height="5" fill="white"/>
</svg>
