<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#3A2060"/>
  <!-- Prague Castle / St. Vitus Cathedral -->
  <!-- Two main towers -->
  <rect x="28" y="22" width="12" height="52" fill="white"/>
  <rect x="60" y="22" width="12" height="52" fill="white"/>
  <!-- Tower spires -->
  <polygon points="28,22 40,22 34,10" fill="white"/>
  <polygon points="60,22 72,22 66,10" fill="white"/>
  <!-- Rose window hint (circle in center) -->
  <ellipse cx="50" cy="46" rx="8" ry="8" fill="white"/>
  <ellipse cx="50" cy="46" rx="5" ry="5" fill="#3A2060"/>
  <!-- Nave body -->
  <rect x="36" y="54" width="28" height="20" fill="white"/>
  <!-- Nave roof -->
  <polygon points="34,54 66,54 50,42" fill="white"/>
  <!-- Small buttresses -->
  <rect x="36" y="60" width="4" height="14" fill="white"/>
  <rect x="60" y="60" width="4" height="14" fill="white"/>
  <!-- Entrance door -->
  <rect x="44" y="66" width="12" height="8" fill="#3A2060"/>
  <ellipse cx="50" cy="66" rx="6" ry="4" fill="#3A2060"/>
  <!-- Base -->
  <rect x="22" y="74" width="56" height="4" fill="white"/>
</svg>
