<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#00568A"/>
  <!-- Sacred Heart Cathedral, Suva, Fiji — twin-towered Gothic cathedral -->
  <!-- Left tower -->
  <rect x="10" y="28" width="20" height="54" fill="white"/>
  <polygon points="10,28 30,28 20,8" fill="white"/>
  <!-- Right tower -->
  <rect x="70" y="28" width="20" height="54" fill="white"/>
  <polygon points="70,28 90,28 80,8" fill="white"/>
  <!-- Nave -->
  <rect x="26" y="44" width="48" height="38" fill="white"/>
  <!-- Gable -->
  <polygon points="26,44 50,24 74,44" fill="white"/>
  <!-- Rose window -->
  <circle cx="50" cy="38" r="9" fill="#00568A" opacity="0.4"/>
  <circle cx="50" cy="38" rx="5" r="5" fill="white"/>
  <!-- Lancet windows on towers -->
  <rect x="13" y="36" width="6" height="14" fill="#00568A" opacity="0.4"/>
  <rect x="21" y="36" width="6" height="14" fill="#00568A" opacity="0.4"/>
  <rect x="73" y="36" width="6" height="14" fill="#00568A" opacity="0.4"/>
  <rect x="81" y="36" width="6" height="14" fill="#00568A" opacity="0.4"/>
  <!-- Main door -->
  <rect x="40" y="60" width="20" height="22" fill="#00568A"/>
  <ellipse cx="50" cy="60" rx="10" ry="9" fill="#00568A"/>
  <!-- Pacific ocean base -->
  <rect x="8" y="86" width="84" height="6" fill="white" opacity="0.2"/>
</svg>
