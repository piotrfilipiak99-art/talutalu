<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#1A5A2A"/>
  <!-- Sultan Qaboos Grand Mosque, Muscat -->
  <!-- Main dome -->
  <ellipse cx="50" cy="38" rx="18" ry="20" fill="white"/>
  <!-- Drum -->
  <rect x="34" y="46" width="32" height="6" fill="white"/>
  <!-- Crescent -->
  <circle cx="50" cy="18" r="5" fill="#1A5A2A"/>
  <circle cx="54" cy="16" r="4" fill="white"/>
  <rect x="49" y="12" width="2" height="6" fill="white"/>
  <!-- Prayer hall body -->
  <rect x="16" y="52" width="68" height="20" fill="white"/>
  <!-- 4 side domes -->
  <ellipse cx="26" cy="48" rx="8" ry="9" fill="white"/>
  <ellipse cx="74" cy="48" rx="8" ry="9" fill="white"/>
  <!-- Main tall minaret (right side, Omani style - tapered) -->
  <polygon points="76,72 84,72 84,16 76,22" fill="white"/>
  <polygon points="76,22 84,16 80,10" fill="white"/>
  <rect x="74" y="30" width="12" height="3" fill="white"/>
  <rect x="74" y="42" width="12" height="3" fill="white"/>
  <!-- 4 smaller minarets -->
  <rect x="8" y="30" width="6" height="44" fill="white"/>
  <polygon points="8,30 14,30 11,18" fill="white"/>
  <rect x="86" y="34" width="6" height="40" fill="white"/>
  <polygon points="86,34 92,34 89,22" fill="white"/>
  <!-- Entrance gate -->
  <rect x="40" y="60" width="20" height="12" fill="#1A5A2A"/>
  <ellipse cx="50" cy="60" rx="10" ry="7" fill="#1A5A2A"/>
  <!-- Base -->
  <rect x="12" y="72" width="76" height="4" fill="white"/>
</svg>
