<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#6A3A8A"/>
  <!-- Plaza Mayor & Governor's Palace / Huaca Pucllana, Lima -->
  <!-- Huaca Pucllana stepped pyramid (pre-Inca) -->
  <!-- Stepped platform pyramid -->
  <rect x="10" y="72" width="80" height="8" fill="white"/>
  <rect x="14" y="64" width="72" height="8" fill="white"/>
  <rect x="18" y="56" width="64" height="8" fill="white"/>
  <rect x="22" y="48" width="56" height="8" fill="white"/>
  <rect x="26" y="40" width="48" height="8" fill="white"/>
  <rect x="30" y="32" width="40" height="8" fill="white"/>
  <rect x="34" y="24" width="32" height="8" fill="white"/>
  <!-- Ramp going up one side -->
  <polygon points="14,72 22,40 22,72" fill="white" opacity="0.5"/>
  <!-- Top platform -->
  <rect x="38" y="20" width="24" height="6" fill="white"/>
</svg>
