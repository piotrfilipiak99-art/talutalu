<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#1A2A5A"/>
  <!-- Juche Tower, Pyongyang -->
  <!-- Tall obelisk-like shaft -->
  <polygon points="42,76 58,76 56,28 44,28" fill="white"/>
  <!-- Torch flame at top -->
  <ellipse cx="50" cy="20" rx="10" ry="14" fill="white"/>
  <path d="M40,22 Q50,8 60,22 Q54,14 50,10 Q46,14 40,22Z" fill="white"/>
  <!-- Flame detail -->
  <ellipse cx="50" cy="18" rx="6" ry="8" fill="#1A2A5A" opacity="0.3"/>
  <!-- Monument base / foundation -->
  <rect x="34" y="76" width="32" height="6" fill="white"/>
  <rect x="28" y="82" width="44" height="4" fill="white"/>
  <!-- Three flags symbolizing Workers' Party -->
  <rect x="18" y="52" width="3" height="26" fill="white"/>
  <polygon points="21,52 35,56 21,60" fill="white"/>
  <rect x="76" y="52" width="3" height="26" fill="white"/>
  <polygon points="76,52 62,56 76,60" fill="white"/>
  <!-- Taedong River base -->
  <rect x="10" y="86" width="80" height="6" fill="white" opacity="0.2"/>
</svg>
