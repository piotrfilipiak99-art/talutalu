<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#1A4A8A"/>
  <!-- Bratislava Castle - white square castle on hill -->
  <!-- Hill -->
  <ellipse cx="50" cy="82" rx="38" ry="12" fill="white" opacity="0.4"/>
  <!-- Main castle body -->
  <rect x="24" y="44" width="52" height="32" fill="white"/>
  <!-- 4 corner towers -->
  <rect x="18" y="36" width="12" height="40" fill="white"/>
  <rect x="70" y="36" width="12" height="40" fill="white"/>
  <rect x="18" y="34" width="12" height="6" fill="white"/>
  <rect x="70" y="34" width="12" height="6" fill="white"/>
  <!-- Tower spires / pointed roofs -->
  <polygon points="18,34 30,34 24,22" fill="white"/>
  <polygon points="70,34 82,34 76,22" fill="white"/>
  <!-- Center roof -->
  <polygon points="22,44 78,44 50,30" fill="white"/>
  <!-- Windows on main body -->
  <rect x="30" y="54" width="6" height="8" fill="#1A4A8A"/>
  <rect x="46" y="54" width="8" height="8" fill="#1A4A8A"/>
  <rect x="64" y="54" width="6" height="8" fill="#1A4A8A"/>
  <!-- Gate entrance -->
  <rect x="43" y="64" width="14" height="12" fill="#1A4A8A"/>
  <ellipse cx="50" cy="64" rx="7" ry="5" fill="#1A4A8A"/>
</svg>
