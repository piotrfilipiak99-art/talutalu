<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#6A1A1A"/>
  <!-- Hassan Tower (Tour Hassan), Rabat - unfinished minaret -->
  <!-- Main tower (very tall, incomplete - no top cap) -->
  <rect x="34" y="14" width="32" height="64" fill="white"/>
  <!-- Carved geometric panels (Zellij-like pattern hints) -->
  <rect x="36" y="20" width="28" height="8" fill="#6A1A1A" opacity="0.2"/>
  <rect x="36" y="34" width="28" height="8" fill="#6A1A1A" opacity="0.2"/>
  <rect x="36" y="48" width="28" height="8" fill="#6A1A1A" opacity="0.2"/>
  <!-- Blind arched niches on each face -->
  <rect x="40" y="24" width="8" height="10" fill="#6A1A1A"/>
  <ellipse cx="44" cy="24" rx="4" ry="4" fill="#6A1A1A"/>
  <rect x="52" y="24" width="8" height="10" fill="#6A1A1A"/>
  <ellipse cx="56" cy="24" rx="4" ry="4" fill="#6A1A1A"/>
  <!-- Base platform with surrounding columns (ruins of intended mosque) -->
  <rect x="10" y="78" width="80" height="4" fill="white"/>
  <!-- Column stumps from planned mosque -->
  <rect x="14" y="68" width="6" height="10" fill="white"/>
  <rect x="24" y="68" width="6" height="10" fill="white"/>
  <rect x="70" y="68" width="6" height="10" fill="white"/>
  <rect x="80" y="68" width="6" height="10" fill="white"/>
  <!-- Bou Regreg river -->
  <rect x="10" y="82" width="80" height="6" fill="white" opacity="0.25"/>
</svg>
