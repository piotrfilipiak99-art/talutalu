<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#1A6A3A"/>
  <!-- National Assembly Building (Jatiyo Sangsad Bhaban), Dhaka - Louis Kahn masterpiece -->
  <!-- Large central cylinder -->
  <circle cx="50" cy="50" r="22" fill="white"/>
  <!-- Circular light wells / geometric cutouts in cylinder -->
  <ellipse cx="50" cy="50" rx="14" ry="14" fill="#1A6A3A" opacity="0.5"/>
  <!-- Surrounding wings (8 smaller geometric volumes) -->
  <rect x="16" y="44" width="14" height="12" fill="white"/>
  <rect x="70" y="44" width="14" height="12" fill="white"/>
  <rect x="44" y="16" width="12" height="14" fill="white"/>
  <rect x="44" y="70" width="12" height="14" fill="white"/>
  <!-- Diagonal wings -->
  <rect x="22" y="22" width="12" height="12" fill="white" transform="rotate(45 28 28)"/>
  <rect x="66" y="22" width="12" height="12" fill="white" transform="rotate(45 72 28)"/>
  <rect x="22" y="66" width="12" height="12" fill="white" transform="rotate(45 28 72)"/>
  <rect x="66" y="66" width="12" height="12" fill="white" transform="rotate(45 72 72)"/>
  <!-- Reflecting pool / base platform -->
  <ellipse cx="50" cy="85" rx="38" ry="6" fill="white" opacity="0.3"/>
  <rect x="12" y="84" width="76" height="3" fill="white"/>
</svg>
