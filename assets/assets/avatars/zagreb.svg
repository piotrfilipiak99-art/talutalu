<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#8A1A2A"/>
  <!-- Zagreb Cathedral - twin spires -->
  <!-- Left spire -->
  <rect x="26" y="22" width="16" height="54" fill="white"/>
  <polygon points="26,22 42,22 34,8" fill="white"/>
  <!-- Right spire -->
  <rect x="58" y="22" width="16" height="54" fill="white"/>
  <polygon points="58,22 74,22 66,8" fill="white"/>
  <!-- Central nave lower body -->
  <rect x="36" y="54" width="28" height="22" fill="white"/>
  <!-- Central facade between spires -->
  <rect x="38" y="44" width="24" height="14" fill="white"/>
  <!-- Rose window -->
  <circle cx="50" cy="50" r="8" fill="#8A1A2A"/>
  <circle cx="50" cy="50" r="6" fill="white" opacity="0.2"/>
  <!-- Entry portal -->
  <rect x="44" y="64" width="12" height="12" fill="#8A1A2A"/>
  <ellipse cx="50" cy="64" rx="6" ry="5" fill="#8A1A2A"/>
  <!-- Base -->
  <rect x="20" y="76" width="60" height="4" fill="white"/>
</svg>
