<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#00568A"/>
  <!-- Hamoudi Mosque, Djibouti City — historic Ottoman-influenced mosque -->
  <!-- Main domed hall -->
  <ellipse cx="50" cy="48" rx="22" ry="18" fill="white"/>
  <!-- Drum -->
  <rect x="30" y="56" width="40" height="8" fill="white"/>
  <!-- Lantern & finial -->
  <rect x="44" y="28" width="12" height="10" fill="white"/>
  <ellipse cx="50" cy="28" rx="7" ry="5" fill="white"/>
  <!-- Crescent & star -->
  <circle cx="50" cy="22" r="4" fill="#00568A"/>
  <circle cx="52" cy="21" r="3" fill="white"/>
  <polygon points="51,19 52,21 54,21 53,22 53,24 51,23 49,24 49,22 48,21 50,21" fill="white"/>
  <!-- Prayer hall base -->
  <rect x="18" y="64" width="64" height="16" fill="white"/>
  <!-- Two thin minarets -->
  <rect x="12" y="30" width="8" height="52" fill="white"/>
  <polygon points="12,30 20,30 16,18" fill="white"/>
  <circle cx="16" cy="17" r="2" fill="#00568A"/>
  <circle cx="17" cy="16.5" r="1.5" fill="white"/>
  <rect x="80" y="30" width="8" height="52" fill="white"/>
  <polygon points="80,30 88,30 84,18" fill="white"/>
  <circle cx="84" cy="17" r="2" fill="#00568A"/>
  <circle cx="85" cy="16.5" r="1.5" fill="white"/>
  <!-- Arched entrance -->
  <rect x="42" y="66" width="16" height="14" fill="#00568A"/>
  <ellipse cx="50" cy="66" rx="8" ry="7" fill="#00568A"/>
  <!-- Base -->
  <rect x="14" y="80" width="72" height="4" fill="white"/>
</svg>
