<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#CC3A00"/>
  <!-- Marina Bay Sands, Singapore -->
  <!-- Three towers -->
  <rect x="18" y="38" width="16" height="44" fill="white"/>
  <rect x="42" y="38" width="16" height="44" fill="white"/>
  <rect x="66" y="38" width="16" height="44" fill="white"/>
  <!-- Sky park / boat-shaped deck connecting all three -->
  <ellipse cx="50" cy="36" rx="38" ry="8" fill="white"/>
  <!-- Garden / trees on top hint -->
  <circle cx="30" cy="30" r="5" fill="white"/>
  <circle cx="50" cy="28" r="5" fill="white"/>
  <circle cx="70" cy="30" r="5" fill="white"/>
  <!-- Infinity pool edge -->
  <rect x="14" y="36" width="72" height="2" fill="white" opacity="0.6"/>
  <!-- Lotus-shaped ArtScience Museum nearby -->
  <ellipse cx="16" cy="72" rx="10" ry="6" fill="white" opacity="0.5"/>
  <!-- Water reflection -->
  <rect x="10" y="82" width="80" height="6" fill="white" opacity="0.2"/>
  <!-- Base -->
  <rect x="14" y="80" width="72" height="3" fill="white"/>
</svg>
