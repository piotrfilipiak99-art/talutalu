<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#1A5A3A"/>
  <!-- Cristo Rei of Dili (giant Jesus statue on globe), Timor-Leste -->
  <!-- Sea -->
  <rect x="10" y="78" width="80" height="12" fill="white" opacity="0.2"/>
  <!-- Rock/hill pedestal -->
  <ellipse cx="50" cy="82" rx="30" ry="10" fill="white" opacity="0.5"/>
  <!-- Globe (sphere the figure stands on) -->
  <circle cx="50" cy="66" r="16" fill="white"/>
  <!-- Globe meridian lines -->
  <ellipse cx="50" cy="66" rx="16" ry="6" fill="none" stroke="#1A5A3A" stroke-width="1.5" opacity="0.4"/>
  <rect x="49" y="50" width="2" height="32" fill="#1A5A3A" opacity="0.4"/>
  <!-- Cristo Rei figure (Christ the King) -->
  <!-- Robe/body -->
  <polygon points="42,66 58,66 54,24 46,24" fill="white"/>
  <!-- Arms outstretched -->
  <rect x="24" y="40" width="52" height="6" fill="white"/>
  <!-- Head and crown -->
  <circle cx="50" cy="20" r="6" fill="white"/>
  <!-- Crown of thorns hint (small spikes) -->
  <polygon points="46,14 48,18 50,14 52,18 54,14" fill="white"/>
  <!-- Steps up to statue base -->
  <rect x="34" y="82" width="32" height="3" fill="white"/>
</svg>
