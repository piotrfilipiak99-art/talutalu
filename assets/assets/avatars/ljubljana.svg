<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#1A6A2A"/>
  <!-- Ljubljana Castle on hill -->
  <!-- Hill -->
  <ellipse cx="50" cy="82" rx="36" ry="10" fill="white" opacity="0.4"/>
  <!-- Castle main tower -->
  <rect x="40" y="26" width="20" height="48" fill="white"/>
  <!-- Tower battlements -->
  <rect x="40" y="20" width="4" height="6" fill="white"/>
  <rect x="46" y="20" width="4" height="6" fill="white"/>
  <rect x="52" y="20" width="4" height="6" fill="white"/>
  <rect x="58" y="20" width="4" height="6" fill="white"/>
  <!-- Watchtower (round) on corner -->
  <circle cx="62" cy="44" r="8" fill="white"/>
  <polygon points="54,38 70,38 62,28" fill="white"/>
  <!-- Castle chapel tower (thin, left) -->
  <rect x="26" y="38" width="16" height="36" fill="white"/>
  <polygon points="26,38 42,38 34,26" fill="white"/>
  <!-- Arched windows -->
  <rect x="44" y="40" width="6" height="10" fill="#1A6A2A"/>
  <ellipse cx="47" cy="40" rx="3" ry="3" fill="#1A6A2A"/>
  <rect x="56" y="40" width="6" height="10" fill="#1A6A2A"/>
  <ellipse cx="59" cy="40" rx="3" ry="3" fill="#1A6A2A"/>
  <!-- Dragon (Ljubljana's symbol) - small hint -->
  <path d="M42,56 Q46,52 50,54 Q54,52 58,56" stroke="white" stroke-width="2" fill="none"/>
  <!-- Base steps -->
  <rect x="22" y="74" width="56" height="4" fill="white"/>
</svg>
