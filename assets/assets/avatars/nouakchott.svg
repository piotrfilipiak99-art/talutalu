<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#4A6A00"/>
  <!-- Saudi Mosque (King Faisal Mosque), Nouakchott — Mauritania's grandest landmark -->
  <!-- Large central dome -->
  <ellipse cx="50" cy="46" rx="24" ry="22" fill="white"/>
  <rect x="28" y="56" width="44" height="8" fill="white"/>
  <!-- Lantern/finial -->
  <rect x="44" y="22" width="12" height="14" fill="white"/>
  <ellipse cx="50" cy="22" rx="7" ry="5" fill="white"/>
  <!-- Crescent and star at top -->
  <circle cx="50" cy="16" r="4" fill="#4A6A00"/>
  <circle cx="52" cy="15" r="3.5" fill="white"/>
  <polygon points="52,12 53,15 56,15 54,17 55,20 52,18 49,20 50,17 48,15 51,15" fill="white"/>
  <!-- Wide prayer hall -->
  <rect x="12" y="64" width="76" height="16" fill="white"/>
  <!-- 4 tall minarets -->
  <rect x="6" y="28" width="10" height="54" fill="white"/>
  <polygon points="6,28 16,28 11,14" fill="white"/>
  <circle cx="11" cy="13" r="2.5" fill="#4A6A00"/>
  <circle cx="12" cy="12.5" r="2" fill="white"/>
  <rect x="84" y="28" width="10" height="54" fill="white"/>
  <polygon points="84,28 94,28 89,14" fill="white"/>
  <circle cx="89" cy="13" r="2.5" fill="#4A6A00"/>
  <circle cx="90" cy="12.5" r="2" fill="white"/>
  <!-- Inner minarets -->
  <rect x="16" y="38" width="8" height="44" fill="white"/>
  <polygon points="16,38 24,38 20,28" fill="white"/>
  <rect x="76" y="38" width="8" height="44" fill="white"/>
  <polygon points="76,38 84,38 80,28" fill="white"/>
  <!-- Entrance arch -->
  <rect x="42" y="66" width="16" height="14" fill="#4A6A00"/>
  <ellipse cx="50" cy="66" rx="8" ry="7" fill="#4A6A00"/>
  <!-- Base -->
  <rect x="8" y="80" width="84" height="4" fill="white"/>
</svg>
