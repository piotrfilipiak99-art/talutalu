<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#5A1A1A"/>
  <!-- Royal Drum Sanctuary, Gitega — the sacred ingoma drums of Burundi -->
  <!-- Traditional thatched circular hut (inzu) housing the royal drums -->
  <!-- Thatched conical roof -->
  <polygon points="20,52 50,8 80,52" fill="white"/>
  <!-- Inner shadow of thatching -->
  <polygon points="26,52 50,14 74,52" fill="#5A1A1A" opacity="0.2"/>
  <line x1="50" y1="8" x2="30" y2="52" stroke="#5A1A1A" stroke-width="1" opacity="0.2"/>
  <line x1="50" y1="8" x2="40" y2="52" stroke="#5A1A1A" stroke-width="1" opacity="0.2"/>
  <line x1="50" y1="8" x2="60" y2="52" stroke="#5A1A1A" stroke-width="1" opacity="0.2"/>
  <line x1="50" y1="8" x2="70" y2="52" stroke="#5A1A1A" stroke-width="1" opacity="0.2"/>
  <!-- Cylindrical walls -->
  <rect x="20" y="50" width="60" height="28" fill="white"/>
  <!-- Curved wall suggestion -->
  <ellipse cx="50" cy="50" rx="30" ry="4" fill="white"/>
  <!-- Doorway arch -->
  <rect x="42" y="60" width="16" height="18" fill="#5A1A1A"/>
  <ellipse cx="50" cy="60" rx="8" ry="6" fill="#5A1A1A"/>
  <!-- Drum visible in foreground (large royal ingoma) -->
  <ellipse cx="50" cy="84" rx="14" ry="5" fill="white"/>
  <rect x="36" y="78" width="28" height="8" fill="white"/>
  <ellipse cx="50" cy="78" rx="14" ry="5" fill="white"/>
  <!-- Drum rope-lacing pattern -->
  <line x1="36" y1="80" x2="64" y2="82" stroke="#5A1A1A" stroke-width="1.5" opacity="0.3"/>
  <line x1="36" y1="83" x2="64" y2="81" stroke="#5A1A1A" stroke-width="1.5" opacity="0.3"/>
</svg>
