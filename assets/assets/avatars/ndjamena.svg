<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#6A3A00"/>
  <!-- Grand Mosque of N'Djamena, Chad — Sahelian style with twin minarets -->
  <!-- Main prayer hall -->
  <rect x="14" y="52" width="72" height="28" fill="white"/>
  <!-- Flat roof parapet with toron (wood beams) -->
  <rect x="12" y="46" width="76" height="10" fill="white"/>
  <!-- Toron beams -->
  <rect x="16" y="42" width="3" height="16" fill="white"/>
  <rect x="24" y="42" width="3" height="16" fill="white"/>
  <rect x="32" y="42" width="3" height="16" fill="white"/>
  <rect x="40" y="42" width="3" height="16" fill="white"/>
  <rect x="54" y="42" width="3" height="16" fill="white"/>
  <rect x="62" y="42" width="3" height="16" fill="white"/>
  <rect x="70" y="42" width="3" height="16" fill="white"/>
  <rect x="78" y="42" width="3" height="16" fill="white"/>
  <!-- Left minaret -->
  <rect x="12" y="18" width="14" height="36" fill="white"/>
  <rect x="10" y="10" width="18" height="14" fill="white"/>
  <polygon points="10,10 28,10 19,2" fill="white"/>
  <!-- Crescent on left minaret -->
  <circle cx="19" cy="2" r="2" fill="#6A3A00"/>
  <circle cx="20" cy="1" r="1.5" fill="white"/>
  <!-- Right minaret -->
  <rect x="74" y="18" width="14" height="36" fill="white"/>
  <rect x="72" y="10" width="18" height="14" fill="white"/>
  <polygon points="72,10 90,10 81,2" fill="white"/>
  <circle cx="81" cy="2" r="2" fill="#6A3A00"/>
  <circle cx="82" cy="1" r="1.5" fill="white"/>
  <!-- Arched facade between minarets -->
  <ellipse cx="50" cy="52" rx="20" ry="10" fill="white"/>
  <!-- Main entrance arch -->
  <rect x="42" y="58" width="16" height="22" fill="#6A3A00"/>
  <ellipse cx="50" cy="58" rx="8" ry="7" fill="#6A3A00"/>
  <!-- Flanking arched windows -->
  <rect x="20" y="58" width="10" height="14" fill="#6A3A00" opacity="0.5"/>
  <ellipse cx="25" cy="58" rx="5" ry="4" fill="#6A3A00" opacity="0.5"/>
  <rect x="70" y="58" width="10" height="14" fill="#6A3A00" opacity="0.5"/>
  <ellipse cx="75" cy="58" rx="5" ry="4" fill="#6A3A00" opacity="0.5"/>
</svg>
