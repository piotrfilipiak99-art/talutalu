<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#8A2A00"/>
  <!-- Anıtkabir (Atatürk Mausoleum), Ankara -->
  <!-- Hall of Honour (long colonnade + main mausoleum) -->
  <!-- Main mausoleum block (Hürriyet Kulesi style) -->
  <rect x="22" y="36" width="56" height="36" fill="white"/>
  <!-- Flat roof with cornice -->
  <rect x="18" y="32" width="64" height="6" fill="white"/>
  <!-- 10 columns on facade -->
  <rect x="22" y="38" width="4" height="28" fill="#8A2A00" opacity="0.4"/>
  <rect x="29" y="38" width="4" height="28" fill="#8A2A00" opacity="0.4"/>
  <rect x="36" y="38" width="4" height="28" fill="#8A2A00" opacity="0.4"/>
  <rect x="43" y="38" width="4" height="28" fill="#8A2A00" opacity="0.4"/>
  <rect x="50" y="38" width="4" height="28" fill="#8A2A00" opacity="0.4"/>
  <rect x="57" y="38" width="4" height="28" fill="#8A2A00" opacity="0.4"/>
  <rect x="64" y="38" width="4" height="28" fill="#8A2A00" opacity="0.4"/>
  <!-- Side towers -->
  <rect x="10" y="28" width="14" height="44" fill="white"/>
  <rect x="76" y="28" width="14" height="44" fill="white"/>
  <!-- Tower tops (flat roof) -->
  <rect x="8" y="24" width="18" height="6" fill="white"/>
  <rect x="74" y="24" width="18" height="6" fill="white"/>
  <!-- Long ceremonial road (Lion Road) hint -->
  <rect x="20" y="72" width="60" height="4" fill="white"/>
  <rect x="14" y="76" width="72" height="4" fill="white"/>
</svg>
