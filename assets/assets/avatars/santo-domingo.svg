<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#6A1A2A"/>
  <!-- Catedral Primada de América, Santo Domingo (oldest cathedral in the Americas) -->
  <!-- Single main tower (asymmetrical - only one was completed) -->
  <rect x="60" y="18" width="20" height="58" fill="white"/>
  <!-- Tower crenellations -->
  <rect x="60" y="12" width="4" height="6" fill="white"/>
  <rect x="66" y="12" width="4" height="6" fill="white"/>
  <rect x="72" y="12" width="4" height="6" fill="white"/>
  <rect x="78" y="12" width="4" height="6" fill="white"/>
  <!-- Bell openings in tower -->
  <rect x="64" y="28" width="6" height="8" fill="#6A1A2A"/>
  <ellipse cx="67" cy="28" rx="3" ry="3" fill="#6A1A2A"/>
  <rect x="72" y="28" width="6" height="8" fill="#6A1A2A"/>
  <ellipse cx="75" cy="28" rx="3" ry="3" fill="#6A1A2A"/>
  <!-- Main nave (wide, horizontal) -->
  <rect x="12" y="42" width="52" height="34" fill="white"/>
  <!-- Plateresque facade (ornate) -->
  <rect x="12" y="38" width="52" height="8" fill="white"/>
  <!-- Central portal (main entrance arch) -->
  <rect x="30" y="56" width="18" height="20" fill="#6A1A2A"/>
  <ellipse cx="39" cy="56" rx="9" ry="8" fill="#6A1A2A"/>
  <!-- Stepped buttresses on sides -->
  <rect x="8" y="52" width="8" height="24" fill="white"/>
  <!-- Side chapels -->
  <rect x="8" y="56" width="6" height="14" fill="white"/>
  <!-- Base / colonial cobblestone -->
  <rect x="8" y="76" width="84" height="4" fill="white"/>
  <!-- Columbus Park -->
  <rect x="8" y="80" width="84" height="4" fill="white" opacity="0.3"/>
</svg>
