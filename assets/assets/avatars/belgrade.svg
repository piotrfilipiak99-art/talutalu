  <!-- Tower battlements -->
  <rect x="32" y="22" width="5" height="8" fill="white"/>
  <rect x="39" y="22" width="5" height="8" fill="white"/>
  <rect x="46" y="22" width="5" height="8" fill="white"/>
  <rect x="53" y="22" width="5" height="8" fill="white"/>
