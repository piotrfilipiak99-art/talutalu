<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#1A6A5A"/>
  <!-- Petronas Twin Towers, Kuala Lumpur -->
  <!-- Left tower -->
  <rect x="18" y="28" width="22" height="52" fill="white"/>
  <!-- Left tower setbacks -->
  <rect x="20" y="22" width="18" height="8" fill="white"/>
  <rect x="22" y="16" width="14" height="8" fill="white"/>
  <rect x="24" y="12" width="10" height="6" fill="white"/>
  <!-- Left spire -->
  <polygon points="26,12 32,12 29,2" fill="white"/>
  <!-- Right tower -->
  <rect x="60" y="28" width="22" height="52" fill="white"/>
  <rect x="62" y="22" width="18" height="8" fill="white"/>
  <rect x="64" y="16" width="14" height="8" fill="white"/>
  <rect x="66" y="12" width="10" height="6" fill="white"/>
  <!-- Right spire -->
  <polygon points="68,12 74,12 71,2" fill="white"/>
  <!-- Sky bridge connecting the towers (floor 41-42) -->
  <rect x="40" y="50" width="20" height="5" fill="white"/>
  <!-- Bridge supports -->
  <rect x="44" y="50" width="3" height="10" fill="white"/>
  <rect x="53" y="50" width="3" height="10" fill="white"/>
  <!-- Podium base -->
  <rect x="14" y="80" width="72" height="4" fill="white"/>
</svg>
