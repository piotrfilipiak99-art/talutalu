<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#3A6A00"/>
  <!-- National Museum of Vanuatu, Port Vila — traditional Nakamal with tam-tam drums -->
  <!-- The tam-tam (slit drum / nalnal) is Vanuatu's most iconic cultural symbol -->
  <!-- Two tall slit drums (tam-tams) carved from tree trunks -->
  <!-- Left drum (taller) -->
  <rect x="18" y="22" width="18" height="62" fill="white" rx="4"/>
  <!-- Carved face on left drum (top) -->
  <circle cx="27" cy="32" r="6" fill="#3A6A00" opacity="0.3"/>
  <!-- Eyes -->
  <circle cx="24" cy="30" r="2" fill="white"/>
  <circle cx="30" cy="30" r="2" fill="white"/>
  <!-- Mouth (slit) -->
  <rect x="22" y="34" width="10" height="2" fill="white"/>
  <!-- Slit down the drum -->
  <rect x="25" y="40" width="4" height="38" fill="#3A6A00" opacity="0.25"/>
  <!-- Geometric carved bands on left drum -->
  <rect x="18" y="48" width="18" height="2" fill="#3A6A00" opacity="0.3"/>
  <rect x="18" y="58" width="18" height="2" fill="#3A6A00" opacity="0.3"/>
  <rect x="18" y="68" width="18" height="2" fill="#3A6A00" opacity="0.3"/>
  <!-- Right drum (slightly shorter) -->
  <rect x="64" y="32" width="18" height="52" fill="white" rx="4"/>
  <!-- Carved face on right drum -->
  <circle cx="73" cy="42" r="6" fill="#3A6A00" opacity="0.3"/>
  <circle cx="70" cy="40" r="2" fill="white"/>
  <circle cx="76" cy="40" r="2" fill="white"/>
  <rect x="68" y="44" width="10" height="2" fill="white"/>
  <!-- Slit -->
  <rect x="71" y="50" width="4" height="28" fill="#3A6A00" opacity="0.25"/>
  <!-- Carved bands on right drum -->
  <rect x="64" y="56" width="18" height="2" fill="#3A6A00" opacity="0.3"/>
  <rect x="64" y="66" width="18" height="2" fill="#3A6A00" opacity="0.3"/>
  <!-- Ground platform / nakamal -->
  <rect x="10" y="82" width="80" height="6" fill="white"/>
  <!-- Vegetation background -->
  <polygon points="42,82 48,68 54,82" fill="white" opacity="0.4"/>
  <polygon points="50,82 56,72 62,82" fill="white" opacity="0.4"/>
</svg>
