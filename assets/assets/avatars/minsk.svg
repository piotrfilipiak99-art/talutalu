<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#0A3A8A"/>
  <!-- Gate of Minsk / Independence Gate - Soviet triumphal arch -->
  <!-- Two tall pylons -->
  <rect x="18" y="34" width="24" height="44" fill="white"/>
  <rect x="58" y="34" width="24" height="44" fill="white"/>
  <!-- Connecting arch/bridge at top -->
  <rect x="18" y="34" width="64" height="14" fill="white"/>
  <!-- Attic / upper structure -->
  <rect x="22" y="20" width="56" height="14" fill="white"/>
  <!-- Star / ornament on top center -->
  <polygon points="50,10 52,18 60,18 54,22 56,30 50,26 44,30 46,22 40,18 48,18" fill="white"/>
  <!-- Clock on attic -->
  <circle cx="50" cy="30" r="5" fill="#0A3A8A"/>
  <!-- Arch opening -->
  <rect x="36" y="42" width="28" height="36" fill="#0A3A8A"/>
  <ellipse cx="50" cy="42" rx="14" ry="8" fill="#0A3A8A"/>
  <!-- Side windows on pylons -->
  <rect x="22" y="50" width="8" height="12" fill="#0A3A8A"/>
  <rect x="70" y="50" width="8" height="12" fill="#0A3A8A"/>
  <!-- Base -->
  <rect x="14" y="78" width="72" height="4" fill="white"/>
</svg>
