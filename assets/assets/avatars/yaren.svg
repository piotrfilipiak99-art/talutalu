<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#1A6A3A"/>
  <!-- Nauru Parliament / Phosphate mining heritage — Nauru's iconic landscape -->
  <!-- Phosphate pinnacles (jagged limestone karst after mining) are Nauru's most distinctive visual -->
  <!-- Series of jagged limestone pinnacles (the mined-out lunar landscape) -->
  <polygon points="10,78 18,42 26,78" fill="white"/>
  <polygon points="20,78 30,30 40,78" fill="white"/>
  <polygon points="32,78 40,48 48,78" fill="white"/>
  <polygon points="44,78 50,36 56,78" fill="white"/>
  <polygon points="52,78 60,52 68,78" fill="white"/>
  <polygon points="62,78 70,38 78,78" fill="white"/>
  <polygon points="72,78 82,46 90,78" fill="white"/>
  <!-- Phosphate works/conveyor belt (horizontal) -->
  <rect x="8" y="76" width="84" height="5" fill="white"/>
  <!-- Ocean fringing reef -->
  <rect x="8" y="84" width="84" height="5" fill="white" opacity="0.3"/>
  <ellipse cx="50" cy="86" rx="42" ry="3" fill="white" opacity="0.2"/>
  <!-- Parliament building (simple rectangle atop ridge) -->
  <rect x="28" y="60" width="44" height="18" fill="white" opacity="0.7"/>
  <polygon points="24,62 50,50 76,62" fill="white" opacity="0.8"/>
</svg>
