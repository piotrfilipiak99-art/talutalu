<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#1A4A7A"/>
  <!-- Stockholm City Hall - square tower with Three Crowns -->
  <!-- Main tower -->
  <rect x="38" y="24" width="24" height="52" fill="white"/>
  <!-- Tower belfry top -->
  <rect x="34" y="18" width="32" height="8" fill="white"/>
  <!-- Spire above belfry -->
  <rect x="46" y="10" width="8" height="8" fill="white"/>
  <!-- Three Crowns on top -->
  <polygon points="46,10 54,10 50,4" fill="white"/>
  <circle cx="44" cy="10" r="2" fill="white"/>
  <circle cx="50" cy="7" r="2" fill="white"/>
  <circle cx="56" cy="10" r="2" fill="white"/>
  <!-- Main building body (lower, wider) -->
  <rect x="18" y="58" width="64" height="18" fill="white"/>
  <!-- Arched arcades -->
  <rect x="22" y="64" width="8" height="12" fill="#1A4A7A"/>
  <ellipse cx="26" cy="64" rx="4" ry="3" fill="#1A4A7A"/>
  <rect x="34" y="64" width="8" height="12" fill="#1A4A7A"/>
  <ellipse cx="38" cy="64" rx="4" ry="3" fill="#1A4A7A"/>
  <rect x="58" y="64" width="8" height="12" fill="#1A4A7A"/>
  <ellipse cx="62" cy="64" rx="4" ry="3" fill="#1A4A7A"/>
  <rect x="70" y="64" width="8" height="12" fill="#1A4A7A"/>
  <ellipse cx="74" cy="64" rx="4" ry="3" fill="#1A4A7A"/>
  <!-- Base / waterline -->
  <rect x="14" y="76" width="72" height="4" fill="white" opacity="0.6"/>
</svg>
