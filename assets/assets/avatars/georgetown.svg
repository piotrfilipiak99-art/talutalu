<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#1A7A3A"/>
  <!-- St. George's Cathedral, Georgetown (world's tallest wooden Gothic) -->
  <!-- Very tall central spire -->
  <rect x="43" y="10" width="14" height="68" fill="white"/>
  <polygon points="43,10 57,10 50,0" fill="white"/>
  <!-- Nave body (wide) -->
  <rect x="18" y="56" width="64" height="22" fill="white"/>
  <!-- Nave pitched roof -->
  <polygon points="14,56 86,56 50,36" fill="white"/>
  <!-- Flying buttresses -->
  <rect x="18" y="60" width="4" height="10" fill="white"/>
  <rect x="78" y="60" width="4" height="10" fill="white"/>
  <!-- Gothic lancet windows -->
  <rect x="22" y="62" width="6" height="12" fill="#1A7A3A"/>
  <polygon points="22,62 28,62 25,56" fill="#1A7A3A"/>
  <rect x="72" y="62" width="6" height="12" fill="#1A7A3A"/>
  <polygon points="72,62 78,62 75,56" fill="#1A7A3A"/>
  <rect x="44" y="62" width="12" height="14" fill="#1A7A3A"/>
  <polygon points="44,62 56,62 50,54" fill="#1A7A3A"/>
  <!-- Entry portal -->
  <rect x="44" y="72" width="12" height="6" fill="white"/>
  <!-- Demerara River hint -->
  <rect x="10" y="82" width="80" height="6" fill="white" opacity="0.25"/>
  <!-- Base -->
  <rect x="14" y="78" width="72" height="4" fill="white"/>
</svg>
