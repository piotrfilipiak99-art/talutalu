<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#8A3A00"/>
  <!-- African Renaissance Monument, Dakar (tallest statue in Africa) -->
  <!-- Seated/standing man figure pointing upward -->
  <!-- Figure body -->
  <rect x="43" y="36" width="14" height="30" fill="white"/>
  <!-- Raised right arm pointing to sky -->
  <rect x="54" y="22" width="6" height="22" fill="white" transform="rotate(-20 57 32)"/>
  <!-- Left arm holding woman and child -->
  <rect x="34" y="34" width="12" height="6" fill="white"/>
  <!-- Woman on arm (smaller figure) -->
  <rect x="24" y="24" width="10" height="16" fill="white"/>
  <circle cx="29" cy="22" r="4" fill="white"/>
  <!-- Child -->
  <rect x="30" y="20" width="6" height="8" fill="white"/>
  <circle cx="33" cy="18" r="3" fill="white"/>
  <!-- Head of main figure -->
  <circle cx="50" cy="32" r="6" fill="white"/>
  <!-- Rocky hill/plinth -->
  <polygon points="20,80 30,52 50,60 70,48 80,80" fill="white" opacity="0.5"/>
  <!-- High pedestal -->
  <rect x="34" y="72" width="32" height="10" fill="white"/>
  <rect x="26" y="82" width="48" height="5" fill="white"/>
  <!-- Atlantic Ocean (Dakar is on a peninsula) -->
  <rect x="10" y="87" width="80" height="5" fill="white" opacity="0.25"/>
</svg>
