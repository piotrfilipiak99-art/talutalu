<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#4A2A6A"/>
  <!-- Casa de la Vall (Parliament), Andorra la Vella -->
  <!-- Mountain backdrop -->
  <polygon points="10,60 30,24 50,36 70,20 90,60" fill="white" opacity="0.2"/>
  <!-- Main building -->
  <rect x="22" y="44" width="56" height="32" fill="white"/>
  <!-- Watchtower (square) on corner -->
  <rect x="60" y="24" width="18" height="24" fill="white"/>
  <!-- Tower battlements -->
  <rect x="60" y="18" width="4" height="6" fill="white"/>
  <rect x="66" y="18" width="4" height="6" fill="white"/>
  <rect x="72" y="18" width="4" height="6" fill="white"/>
  <!-- Roof gable on main building -->
  <polygon points="20,44 80,44 50,28" fill="white"/>
  <!-- Windows on facade -->
  <rect x="28" y="52" width="8" height="10" fill="#4A2A6A"/>
  <rect x="42" y="52" width="8" height="10" fill="#4A2A6A"/>
  <rect x="56" y="52" width="8" height="10" fill="#4A2A6A"/>
  <!-- Entry arch -->
  <rect x="43" y="62" width="14" height="14" fill="#4A2A6A"/>
  <ellipse cx="50" cy="62" rx="7" ry="5" fill="#4A2A6A"/>
  <!-- Coat of arms shield above door -->
  <rect x="46" y="46" width="8" height="10" fill="#4A2A6A" opacity="0.4"/>
  <!-- Base -->
  <rect x="18" y="76" width="64" height="4" fill="white"/>
</svg>
