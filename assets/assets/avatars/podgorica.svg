<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#8A2A00"/>
  <!-- Ribnica Fortress / Old Bridge, Podgorica - use bridge arch -->
  <!-- River -->
  <rect x="10" y="68" width="80" height="14" fill="white" opacity="0.3"/>
  <!-- Bridge arch - single Roman stone arch -->
  <path d="M14,68 Q14,44 50,42 Q86,44 86,68" fill="none" stroke="white" stroke-width="6"/>
  <!-- Bridge roadway -->
  <rect x="14" y="64" width="72" height="8" fill="white"/>
  <!-- Bridge parapets -->
  <rect x="14" y="60" width="72" height="4" fill="white"/>
  <!-- Parapet merlons -->
  <rect x="18" y="56" width="4" height="4" fill="white"/>
  <rect x="26" y="56" width="4" height="4" fill="white"/>
  <rect x="34" y="56" width="4" height="4" fill="white"/>
  <rect x="42" y="56" width="4" height="4" fill="white"/>
  <rect x="50" y="56" width="4" height="4" fill="white"/>
  <rect x="58" y="56" width="4" height="4" fill="white"/>
  <rect x="66" y="56" width="4" height="4" fill="white"/>
  <rect x="74" y="56" width="4" height="4" fill="white"/>
  <!-- Mountain silhouette in background -->
  <polygon points="10,50 30,28 50,38 70,24 90,50" fill="white" opacity="0.2"/>
</svg>
