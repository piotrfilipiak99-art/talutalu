<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#CC2A2A"/>
  <!-- Temple of Heaven, Beijing -->
  <!-- Top tier roof (triple-eaved) -->
  <polygon points="34,36 66,36 50,22" fill="white"/>
  <rect x="34" y="36" width="32" height="4" fill="white"/>
  <!-- Middle tier -->
  <polygon points="28,48 72,48 50,34" fill="white"/>
  <rect x="28" y="48" width="44" height="4" fill="white"/>
  <!-- Lower tier (widest) -->
  <polygon points="22,60 78,60 50,46" fill="white"/>
  <rect x="22" y="60" width="56" height="4" fill="white"/>
  <!-- Central cylinder body -->
  <rect x="40" y="60" width="20" height="14" fill="white"/>
  <!-- Three-tiered circular terrace -->
  <rect x="30" y="74" width="40" height="4" fill="white"/>
  <rect x="24" y="78" width="52" height="3" fill="white"/>
  <!-- Finial on top -->
  <ellipse cx="50" cy="22" rx="4" ry="3" fill="white"/>
  <rect x="48" y="16" width="4" height="6" fill="white"/>
  <ellipse cx="50" cy="15" rx="2" ry="2" fill="white"/>
</svg>
