<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#1A5A1A"/>
  <!-- Blue Mountains / Devon House, Kingston -->
  <!-- Blue Mountains backdrop -->
  <polygon points="10,64 30,22 50,40 70,18 90,64" fill="white" opacity="0.25"/>
  <!-- Devon House (Georgian mansion) -->
  <rect x="16" y="52" width="68" height="28" fill="white"/>
  <!-- Hipped roof -->
  <polygon points="12,52 88,52 82,36 18,36" fill="white"/>
  <!-- Central dormer window -->
  <rect x="44" y="34" width="12" height="12" fill="white"/>
  <polygon points="42,34 58,34 50,26" fill="white"/>
  <!-- 4 large columns on porch -->
  <rect x="24" y="52" width="5" height="22" fill="#1A5A1A" opacity="0.3"/>
  <rect x="34" y="52" width="5" height="22" fill="#1A5A1A" opacity="0.3"/>
  <rect x="58" y="52" width="5" height="22" fill="#1A5A1A" opacity="0.3"/>
  <rect x="68" y="52" width="5" height="22" fill="#1A5A1A" opacity="0.3"/>
  <!-- Sash windows -->
  <rect x="18" y="58" width="8" height="12" fill="#1A5A1A" opacity="0.5"/>
  <rect x="74" y="58" width="8" height="12" fill="#1A5A1A" opacity="0.5"/>
  <!-- Entrance door -->
  <rect x="44" y="64" width="12" height="16" fill="#1A5A1A"/>
  <ellipse cx="50" cy="64" rx="6" ry="4" fill="#1A5A1A"/>
  <!-- Steps -->
  <rect x="34" y="80" width="32" height="3" fill="white"/>
  <rect x="26" y="83" width="48" height="3" fill="white"/>
</svg>
