<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#0A4A6A"/>
  <!-- Victoria Clock Tower (Little Big Ben), Victoria, Seychelles -->
  <!-- Miniature replica of Big Ben — the iconic symbol of the smallest capital city -->
  <!-- Clock tower base and shaft -->
  <rect x="38" y="34" width="24" height="48" fill="white"/>
  <!-- Decorative band / belfry stage -->
  <rect x="34" y="34" width="32" height="10" fill="white"/>
  <rect x="34" y="44" width="32" height="4" fill="white"/>
  <!-- Clock faces (four sides) -->
  <circle cx="50" cy="26" r="9" fill="#0A4A6A" opacity="0.4"/>
  <circle cx="50" cy="26" r="6" fill="white"/>
  <!-- Clock hands -->
  <line x1="50" y1="26" x2="50" y2="20" stroke="#0A4A6A" stroke-width="2"/>
  <line x1="50" y1="26" x2="55" y2="28" stroke="#0A4A6A" stroke-width="1.5"/>
  <!-- Ornate top: corniche and spire -->
  <rect x="36" y="18" width="28" height="8" fill="white"/>
  <rect x="40" y="12" width="20" height="8" fill="white"/>
  <polygon points="40,12 50,2 60,12" fill="white"/>
  <!-- Decorative corner finials -->
  <polygon points="36,18 36,14 40,18" fill="white"/>
  <polygon points="64,18 64,14 60,18" fill="white"/>
  <!-- Victorian ironwork fence at base -->
  <rect x="22" y="82" width="56" height="4" fill="white"/>
  <rect x="24" y="78" width="3" height="8" fill="white"/>
  <rect x="32" y="78" width="3" height="8" fill="white"/>
  <rect x="40" y="78" width="3" height="8" fill="white"/>
  <rect x="54" y="78" width="3" height="8" fill="white"/>
  <rect x="62" y="78" width="3" height="8" fill="white"/>
  <rect x="70" y="78" width="3" height="8" fill="white"/>
  <!-- Indian Ocean backdrop suggestion -->
  <rect x="8" y="88" width="84" height="6" fill="white" opacity="0.15"/>
</svg>
