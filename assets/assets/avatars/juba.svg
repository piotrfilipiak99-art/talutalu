<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#4A2A00"/>
  <!-- John Garang Mausoleum, Juba — South Sudan's most significant national monument -->
  <!-- Modernist domed memorial structure -->
  <!-- Main dome (large, prominent) -->
  <ellipse cx="50" cy="44" rx="30" ry="26" fill="white"/>
  <!-- Drum -->
  <rect x="22" y="56" width="56" height="8" fill="white"/>
  <!-- Lantern -->
  <rect x="42" y="16" width="16" height="16" fill="white"/>
  <ellipse cx="50" cy="16" rx="9" ry="7" fill="white"/>
  <!-- Star (South Sudan flag) on dome -->
  <polygon points="50,30 52,36 58,36 53,40 55,46 50,42 45,46 47,40 42,36 48,36" fill="#4A2A00" opacity="0.3"/>
  <!-- Wide plinth/base -->
  <rect x="12" y="64" width="76" height="10" fill="white"/>
  <rect x="6" y="74" width="88" height="6" fill="white"/>
  <rect x="4" y="80" width="92" height="5" fill="white" opacity="0.5"/>
  <!-- Nile River at base -->
  <rect x="8" y="88" width="84" height="6" fill="white" opacity="0.2"/>
  <!-- Flagpoles flanking monument -->
  <rect x="16" y="36" width="3" height="38" fill="white"/>
  <polygon points="19,36 19,28 28,32" fill="white"/>
  <rect x="81" y="36" width="3" height="38" fill="white"/>
  <polygon points="81,36 81,28 72,32" fill="white"/>
</svg>
