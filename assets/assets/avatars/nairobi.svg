<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#1A4A2A"/>
  <!-- KICC (Kenyatta International Convention Centre), Nairobi - drum tower with helipad cap -->
  <!-- Cylindrical tower shaft -->
  <ellipse cx="50" cy="34" rx="18" ry="6" fill="white"/>
  <rect x="32" y="34" width="36" height="44" fill="white"/>
  <ellipse cx="50" cy="78" rx="18" ry="6" fill="white"/>
  <!-- Helipad disc cap on top -->
  <ellipse cx="50" cy="26" rx="26" ry="8" fill="white"/>
  <!-- Cone/dome above helipad -->
  <polygon points="28,26 72,26 50,10" fill="white"/>
  <!-- Antenna -->
  <rect x="48" y="4" width="4" height="6" fill="white"/>
  <!-- Horizontal bands on cylinder (floors) -->
  <rect x="32" y="44" width="36" height="2" fill="#1A4A2A" opacity="0.3"/>
  <rect x="32" y="54" width="36" height="2" fill="#1A4A2A" opacity="0.3"/>
  <rect x="32" y="64" width="36" height="2" fill="#1A4A2A" opacity="0.3"/>
  <!-- Parliament annex (low rectangular building beside tower) -->
  <rect x="10" y="60" width="24" height="18" fill="white"/>
  <rect x="66" y="60" width="24" height="18" fill="white"/>
  <!-- Base -->
  <rect x="8" y="78" width="84" height="4" fill="white"/>
  <!-- Uhuru Park hint (greenery) -->
  <ellipse cx="20" cy="82" rx="12" ry="5" fill="white" opacity="0.2"/>
</svg>
