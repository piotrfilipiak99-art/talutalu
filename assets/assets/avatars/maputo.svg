<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#8A4A00"/>
  <!-- Maputo Central Railway Station — magnificent Eiffel-era domed terminus -->
  <!-- Grand central dome -->
  <ellipse cx="50" cy="38" rx="22" ry="20" fill="white"/>
  <rect x="30" y="48" width="40" height="6" fill="white"/>
  <!-- Lantern on dome -->
  <rect x="44" y="16" width="12" height="14" fill="white"/>
  <ellipse cx="50" cy="16" rx="7" ry="5" fill="white"/>
  <!-- Dome spike -->
  <rect x="48" y="8" width="4" height="12" fill="white"/>
  <!-- Main station building (Beaux-Arts facade) -->
  <rect x="10" y="54" width="80" height="28" fill="white"/>
  <!-- Arched portico with clock tower flanks -->
  <!-- Left tower -->
  <rect x="10" y="32" width="18" height="52" fill="white"/>
  <rect x="8" y="28" width="22" height="8" fill="white"/>
  <polygon points="8,28 30,28 19,14" fill="white"/>
  <!-- Right tower -->
  <rect x="72" y="32" width="18" height="52" fill="white"/>
  <rect x="70" y="28" width="22" height="8" fill="white"/>
  <polygon points="70,28 92,28 81,14" fill="white"/>
  <!-- Five large arched windows on facade -->
  <rect x="14" y="60" width="10" height="18" fill="#8A4A00" opacity="0.4"/>
  <ellipse cx="19" cy="60" rx="5" ry="5" fill="#8A4A00" opacity="0.4"/>
  <rect x="28" y="60" width="10" height="18" fill="#8A4A00" opacity="0.4"/>
  <ellipse cx="33" cy="60" rx="5" ry="5" fill="#8A4A00" opacity="0.4"/>
  <rect x="44" y="60" width="12" height="18" fill="#8A4A00" opacity="0.4"/>
  <ellipse cx="50" cy="60" rx="6" ry="5" fill="#8A4A00" opacity="0.4"/>
  <rect x="60" y="60" width="10" height="18" fill="#8A4A00" opacity="0.4"/>
  <ellipse cx="65" cy="60" rx="5" ry="5" fill="#8A4A00" opacity="0.4"/>
  <rect x="74" y="60" width="10" height="18" fill="#8A4A00" opacity="0.4"/>
  <ellipse cx="79" cy="60" rx="5" ry="5" fill="#8A4A00" opacity="0.4"/>
  <!-- Platform ground -->
  <rect x="8" y="82" width="84" height="4" fill="white"/>
</svg>
