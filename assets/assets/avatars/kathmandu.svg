<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#8A4A00"/>
  <!-- Boudhanath Stupa, Kathmandu -->
  <!-- Base (three concentric stepped platforms) -->
  <rect x="10" y="72" width="80" height="5" fill="white"/>
  <rect x="14" y="67" width="72" height="6" fill="white"/>
  <rect x="18" y="62" width="64" height="6" fill="white"/>
  <!-- Dome (large white hemisphere) -->
  <ellipse cx="50" cy="60" rx="28" ry="22" fill="white"/>
  <!-- Harmika square box on dome -->
  <rect x="40" y="36" width="20" height="14" fill="white"/>
  <!-- 13 rings (tiers to enlightenment) - as stacked rectangles narrowing -->
  <rect x="40" y="32" width="20" height="4" fill="white"/>
  <rect x="42" y="28" width="16" height="4" fill="white"/>
  <rect x="44" y="25" width="12" height="3" fill="white"/>
  <rect x="45" y="22" width="10" height="3" fill="white"/>
  <rect x="46" y="20" width="8" height="2" fill="white"/>
  <!-- Pinnacle spire -->
  <polygon points="46,20 54,20 50,8" fill="white"/>
  <!-- All-seeing Buddha eyes (painted on harmika) - simplified -->
  <ellipse cx="44" cy="42" rx="3" ry="4" fill="#8A4A00"/>
  <ellipse cx="56" cy="42" rx="3" ry="4" fill="#8A4A00"/>
  <!-- Prayer flags hint -->
  <line x1="50" y1="8" x2="20" y2="24" stroke="white" stroke-width="1" opacity="0.5"/>
  <line x1="50" y1="8" x2="80" y2="24" stroke="white" stroke-width="1" opacity="0.5"/>
</svg>
