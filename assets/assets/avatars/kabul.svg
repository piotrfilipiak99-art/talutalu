<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#4A3A1A"/>
  <!-- Darul Aman Palace, Kabul - neoclassical ruins -->
  <!-- Mountain backdrop (Hindu Kush) -->
  <polygon points="10,66 35,30 60,46 80,26 90,66" fill="white" opacity="0.15"/>
  <!-- Palace facade (long neoclassical building) -->
  <rect x="10" y="56" width="80" height="24" fill="white"/>
  <!-- Corinthian columns (6) on facade -->
  <rect x="14" y="42" width="5" height="18" fill="white"/>
  <rect x="24" y="42" width="5" height="18" fill="white"/>
  <rect x="37" y="36" width="6" height="22" fill="white"/>
  <rect x="49" y="36" width="6" height="22" fill="white"/>
  <rect x="62" y="42" width="5" height="18" fill="white"/>
  <rect x="72" y="42" width="5" height="18" fill="white"/>
  <!-- Central pediment -->
  <rect x="30" y="30" width="40" height="8" fill="white"/>
  <polygon points="28,30 72,30 50,18" fill="white"/>
  <!-- Entablature -->
  <rect x="10" y="55" width="80" height="5" fill="white"/>
  <!-- Windows (some broken/open - ruins hint) -->
  <rect x="16" y="64" width="8" height="10" fill="#4A3A1A"/>
  <rect x="36" y="64" width="8" height="10" fill="#4A3A1A"/>
  <rect x="56" y="64" width="8" height="10" fill="#4A3A1A"/>
  <rect x="76" y="64" width="8" height="10" fill="#4A3A1A"/>
  <!-- Base plinth -->
  <rect x="6" y="80" width="88" height="4" fill="white"/>
</svg>
