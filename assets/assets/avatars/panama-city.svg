<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#1A5A6A"/>
  <!-- Panama Canal locks + skyline (iconic combination) -->
  <!-- Canal lock gates (simplified) -->
  <rect x="10" y="54" width="80" height="6" fill="white"/>
  <!-- Lock walls -->
  <rect x="10" y="40" width="14" height="20" fill="white"/>
  <rect x="76" y="40" width="14" height="20" fill="white"/>
  <!-- Gate pairs -->
  <rect x="22" y="46" width="6" height="14" fill="white"/>
  <rect x="72" y="46" width="6" height="14" fill="white"/>
  <!-- Miraflores control building -->
  <rect x="36" y="44" width="28" height="16" fill="white"/>
  <rect x="38" y="40" width="24" height="6" fill="white"/>
  <!-- Panama City modern skyline in background -->
  <rect x="56" y="28" width="8" height="22" fill="white" opacity="0.6"/>
  <polygon points="56,28 64,28 60,16" fill="white" opacity="0.6"/>
  <rect x="68" y="32" width="8" height="18" fill="white" opacity="0.5"/>
  <rect x="80" y="36" width="8" height="14" fill="white" opacity="0.4"/>
  <!-- Pacific Ocean / canal water -->
  <rect x="10" y="60" width="80" height="22" fill="white" opacity="0.2"/>
  <rect x="10" y="60" width="80" height="3" fill="white"/>
  <!-- Ship hint in canal -->
  <rect x="38" y="56" width="24" height="5" fill="white" opacity="0.6"/>
</svg>
