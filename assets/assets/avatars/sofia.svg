<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#1A4A8A"/>
  <!-- Alexander Nevsky Cathedral, Sofia -->
  <!-- Large central dome -->
  <ellipse cx="50" cy="38" rx="14" ry="16" fill="white"/>
  <!-- Central drum -->
  <rect x="38" y="46" width="24" height="8" fill="white"/>
  <!-- Cross on top -->
  <rect x="48" y="18" width="4" height="12" fill="white"/>
  <rect x="44" y="22" width="12" height="3" fill="white"/>
  <!-- Main building -->
  <rect x="18" y="54" width="64" height="20" fill="white"/>
  <!-- Side domes -->
  <ellipse cx="28" cy="50" rx="8" ry="9" fill="white"/>
  <rect x="28" y="20" width="3" height="8" fill="white"/>
  <rect x="26" y="22" width="7" height="2" fill="white"/>
  <ellipse cx="72" cy="50" rx="8" ry="9" fill="white"/>
  <rect x="69" y="20" width="3" height="8" fill="white"/>
  <rect x="67" y="22" width="7" height="2" fill="white"/>
  <!-- Small corner domes -->
  <ellipse cx="20" cy="56" rx="5" ry="6" fill="white"/>
  <ellipse cx="80" cy="56" rx="5" ry="6" fill="white"/>
  <!-- Arcade windows -->
  <rect x="22" y="60" width="6" height="10" fill="#1A4A8A"/>
  <ellipse cx="25" cy="60" rx="3" ry="3" fill="#1A4A8A"/>
  <rect x="46" y="60" width="8" height="10" fill="#1A4A8A"/>
  <ellipse cx="50" cy="60" rx="4" ry="3" fill="#1A4A8A"/>
  <rect x="72" y="60" width="6" height="10" fill="#1A4A8A"/>
  <ellipse cx="75" cy="60" rx="3" ry="3" fill="#1A4A8A"/>
  <!-- Base -->
  <rect x="14" y="74" width="72" height="4" fill="white"/>
</svg>
