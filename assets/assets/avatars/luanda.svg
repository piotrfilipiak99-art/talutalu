<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#8A2A00"/>
  <!-- Fortaleza de São Miguel, Luanda — 16th-century Portuguese star fort -->
  <!-- Star-shaped bastion walls (4-pointed) -->
  <polygon points="50,12 62,38 88,50 62,62 50,88 38,62 12,50 38,38" fill="white" opacity="0.3"/>
  <!-- Inner walls forming square -->
  <rect x="28" y="28" width="44" height="44" fill="white" opacity="0.5"/>
  <!-- Central fort keep -->
  <rect x="36" y="36" width="28" height="28" fill="white"/>
  <!-- Tower at centre -->
  <rect x="43" y="26" width="14" height="20" fill="white"/>
  <!-- Crenellations on tower -->
  <rect x="43" y="22" width="3" height="5" fill="white"/>
  <rect x="48" y="22" width="3" height="5" fill="white"/>
  <rect x="53" y="22" width="3" height="5" fill="white"/>
  <!-- Flagpole -->
  <rect x="49" y="12" width="2" height="16" fill="white"/>
  <!-- Gate arch -->
  <rect x="44" y="58" width="12" height="10" fill="#8A2A00"/>
  <ellipse cx="50" cy="58" rx="6" ry="5" fill="#8A2A00"/>
  <!-- Ocean/bay (Luanda Bay) -->
  <rect x="10" y="84" width="80" height="8" fill="white" opacity="0.2"/>
  <ellipse cx="50" cy="88" rx="40" ry="4" fill="white" opacity="0.15"/>
</svg>
