<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#005A3A"/>
  <!-- Sainte-Marie Cathedral, Libreville — towering twin-spire Gothic cathedral -->
  <!-- Left spire -->
  <rect x="12" y="30" width="18" height="52" fill="white"/>
  <polygon points="12,30 30,30 21,8" fill="white"/>
  <!-- Right spire -->
  <rect x="70" y="30" width="18" height="52" fill="white"/>
  <polygon points="70,30 88,30 79,8" fill="white"/>
  <!-- Central nave (lower) -->
  <rect x="26" y="46" width="48" height="36" fill="white"/>
  <!-- Nave pointed gable -->
  <polygon points="26,46 50,24 74,46" fill="white"/>
  <!-- Rose window -->
  <circle cx="50" cy="40" r="9" fill="#005A3A" opacity="0.4"/>
  <circle cx="50" cy="40" r="5" fill="white"/>
  <!-- Lancet window set (triple) on spires -->
  <rect x="15" y="40" width="5" height="14" fill="#005A3A" opacity="0.4"/>
  <rect x="22" y="40" width="5" height="14" fill="#005A3A" opacity="0.4"/>
  <rect x="73" y="40" width="5" height="14" fill="#005A3A" opacity="0.4"/>
  <rect x="80" y="40" width="5" height="14" fill="#005A3A" opacity="0.4"/>
  <!-- Triforium arches on nave -->
  <rect x="30" y="52" width="8" height="12" fill="#005A3A" opacity="0.3"/>
  <rect x="46" y="52" width="8" height="12" fill="#005A3A" opacity="0.3"/>
  <rect x="62" y="52" width="8" height="12" fill="#005A3A" opacity="0.3"/>
  <!-- Main double doorway -->
  <rect x="36" y="62" width="14" height="20" fill="#005A3A"/>
  <ellipse cx="43" cy="62" rx="7" ry="6" fill="#005A3A"/>
  <rect x="50" y="62" width="14" height="20" fill="#005A3A"/>
  <ellipse cx="57" cy="62" rx="7" ry="6" fill="#005A3A"/>
  <!-- Steps -->
  <rect x="22" y="82" width="56" height="3" fill="white"/>
  <rect x="18" y="85" width="64" height="3" fill="white"/>
</svg>
