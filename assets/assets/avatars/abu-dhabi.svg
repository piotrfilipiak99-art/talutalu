<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#1A5A5A"/>
  <!-- Sheikh Zayed Grand Mosque, Abu Dhabi -->
  <!-- Main dome (large central) -->
  <ellipse cx="50" cy="44" rx="18" ry="20" fill="white"/>
  <!-- Dome neck -->
  <rect x="36" y="52" width="28" height="6" fill="white"/>
  <!-- Crescent on dome -->
  <circle cx="50" cy="24" r="4" fill="#1A5A5A"/>
  <circle cx="53" cy="22" r="3" fill="white"/>
  <rect x="49" y="19" width="2" height="5" fill="white"/>
  <!-- Main prayer hall body -->
  <rect x="16" y="58" width="68" height="18" fill="white"/>
  <!-- Side smaller domes (4) -->
  <ellipse cx="26" cy="54" rx="8" ry="9" fill="white"/>
  <ellipse cx="74" cy="54" rx="8" ry="9" fill="white"/>
  <ellipse cx="34" cy="56" rx="6" ry="7" fill="white"/>
  <ellipse cx="66" cy="56" rx="6" ry="7" fill="white"/>
  <!-- 4 minarets -->
  <rect x="8" y="28" width="8" height="50" fill="white"/>
  <polygon points="8,28 16,28 12,14" fill="white"/>
  <rect x="84" y="28" width="8" height="50" fill="white"/>
  <polygon points="84,28 92,28 88,14" fill="white"/>
  <rect x="14" y="34" width="8" height="44" fill="white"/>
  <polygon points="14,34 22,34 18,20" fill="white"/>
  <rect x="78" y="34" width="8" height="44" fill="white"/>
  <polygon points="78,34 86,34 82,20" fill="white"/>
  <!-- Base / reflecting pool -->
  <rect x="10" y="76" width="80" height="4" fill="white"/>
  <rect x="10" y="80" width="80" height="4" fill="white" opacity="0.3"/>
</svg>
