<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#1A5A3A"/>
  <!-- Palacio Legislativo, Montevideo -->
  <!-- Central dome -->
  <ellipse cx="50" cy="38" rx="14" ry="14" fill="white"/>
  <rect x="38" y="46" width="24" height="6" fill="white"/>
  <!-- Lantern -->
  <rect x="46" y="22" width="8" height="8" fill="white"/>
  <ellipse cx="50" cy="22" rx="4" ry="3" fill="white"/>
  <rect x="48" y="16" width="4" height="6" fill="white"/>
  <!-- Main building -->
  <rect x="12" y="52" width="76" height="26" fill="white"/>
  <!-- Corinthian colonnade (central) -->
  <rect x="24" y="52" width="4" height="22" fill="#1A5A3A" opacity="0.35"/>
  <rect x="32" y="52" width="4" height="22" fill="#1A5A3A" opacity="0.35"/>
  <rect x="60" y="52" width="4" height="22" fill="#1A5A3A" opacity="0.35"/>
  <rect x="68" y="52" width="4" height="22" fill="#1A5A3A" opacity="0.35"/>
  <!-- Wing pavilions (end pavilions) -->
  <rect x="8" y="48" width="16" height="30" fill="white"/>
  <polygon points="8,48 24,48 16,36" fill="white"/>
  <rect x="76" y="48" width="16" height="30" fill="white"/>
  <polygon points="76,48 92,48 84,36" fill="white"/>
  <!-- Entrance steps -->
  <rect x="20" y="78" width="60" height="3" fill="white"/>
  <rect x="14" y="81" width="72" height="3" fill="white"/>
  <!-- Río de la Plata -->
  <rect x="10" y="84" width="80" height="6" fill="white" opacity="0.2"/>
</svg>
