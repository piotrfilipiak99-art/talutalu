<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#2A6A2A"/>
  <!-- Azadi Tower (Freedom Tower), Tehran -->
  <!-- The iconic inverted Y shape -->
  <!-- Left leg -->
  <polygon points="14,82 30,82 44,42 36,42" fill="white"/>
  <!-- Right leg -->
  <polygon points="56,42 64,42 70,82 86,82" fill="white"/>
  <!-- Central arch (connecting the two legs) -->
  <path d="M36,42 Q50,22 64,42" stroke="white" stroke-width="12" fill="none"/>
  <!-- Fill the arch solidly -->
  <path d="M36,42 Q36,24 50,18 Q64,24 64,42 L58,42 Q58,28 50,24 Q42,28 42,42Z" fill="white"/>
  <!-- Top part above arch -->
  <rect x="40" y="14" width="20" height="8" fill="white"/>
  <!-- Decorative Kufic tile work on arch surface (dark cut) -->
  <path d="M40,38 Q50,24 60,38 Q50,26 40,38Z" fill="#2A6A2A" opacity="0.3"/>
  <!-- Base platform -->
  <rect x="10" y="82" width="80" height="4" fill="white"/>
  <rect x="14" y="86" width="72" height="3" fill="white" opacity="0.5"/>
</svg>
