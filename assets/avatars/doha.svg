<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#5A2A8A"/>
  <!-- Museum of Islamic Art + Doha skyline -->
  <!-- MIA building (geometric stepped form) -->
  <rect x="20" y="62" width="30" height="14" fill="white"/>
  <rect x="24" y="52" width="22" height="12" fill="white"/>
  <rect x="28" y="42" width="14" height="12" fill="white"/>
  <rect x="32" y="36" width="6" height="8" fill="white"/>
  <!-- Small dome on MIA top -->
  <ellipse cx="35" cy="36" rx="5" ry="4" fill="white"/>
  <!-- Doha skyline towers (right side) -->
  <rect x="58" y="38" width="8" height="38" fill="white"/>
  <polygon points="58,38 66,38 62,26" fill="white"/>
  <rect x="70" y="48" width="8" height="28" fill="white"/>
  <polygon points="70,48 78,48 74,36" fill="white"/>
  <rect x="82" y="54" width="6" height="22" fill="white"/>
  <polygon points="82,54 88,54 85,44" fill="white"/>
  <!-- Water / corniche -->
  <rect x="10" y="76" width="80" height="5" fill="white" opacity="0.3"/>
  <rect x="10" y="76" width="80" height="2" fill="white"/>
  <!-- Dhow (traditional boat) hint -->
  <path d="M16,74 Q24,68 32,74" fill="white" opacity="0.6"/>
  <rect x="22" y="64" width="1" height="10" fill="white" opacity="0.6"/>
</svg>
