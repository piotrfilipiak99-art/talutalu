<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#003A6A"/>
  <!-- Australian Parliament House, Canberra — with iconic flagpole on Capital Hill -->
  <!-- Grassed hill with two wings -->
  <!-- Sloped grass forecourt -->
  <polygon points="10,70 50,52 90,70" fill="white" opacity="0.3"/>
  <!-- Left wing (marble facade) -->
  <rect x="8" y="56" width="34" height="28" fill="white"/>
  <!-- Right wing -->
  <rect x="58" y="56" width="34" height="28" fill="white"/>
  <!-- Central circular forecourt area (linking wings) -->
  <ellipse cx="50" cy="60" rx="20" ry="8" fill="white"/>
  <!-- Main building centre -->
  <rect x="30" y="58" width="40" height="22" fill="white"/>
  <!-- Columned portico -->
  <rect x="32" y="58" width="4" height="18" fill="#003A6A" opacity="0.3"/>
  <rect x="40" y="58" width="4" height="18" fill="#003A6A" opacity="0.3"/>
  <rect x="56" y="58" width="4" height="18" fill="#003A6A" opacity="0.3"/>
  <rect x="64" y="58" width="4" height="18" fill="#003A6A" opacity="0.3"/>
  <!-- The famous giant flagpole (81m tall stainless steel) -->
  <rect x="48" y="8" width="4" height="52" fill="white"/>
  <!-- Flag at top (Australian flag simplified) -->
  <rect x="52" y="8" width="20" height="14" fill="white"/>
  <rect x="52" y="8" width="20" height="7" fill="#003A6A" opacity="0.5"/>
  <!-- Southern Cross stars on flag -->
  <circle cx="58" cy="11" r="1.5" fill="white"/>
  <circle cx="64" cy="14" r="1.5" fill="white"/>
  <circle cx="69" cy="10" r="1.5" fill="white"/>
  <!-- Steps -->
  <rect x="28" y="80" width="44" height="3" fill="white"/>
  <rect x="20" y="83" width="60" height="3" fill="white"/>
  <!-- Lake Burley Griffin hint -->
  <rect x="8" y="88" width="84" height="6" fill="white" opacity="0.2"/>
</svg>
