<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#1A4A9A"/>
  <!-- Newborn Monument + "NEWBORN" letters (iconic) -->
  <!-- 7 large block letters N-E-W-B-O-R-N arranged in a row -->
  <!-- Simplified as colored rectangular blocks -->
  <rect x="8"  y="42" width="10" height="28" fill="white"/>
  <rect x="20" y="42" width="10" height="28" fill="white"/>
  <rect x="32" y="42" width="10" height="28" fill="white"/>
  <rect x="44" y="42" width="10" height="28" fill="white"/>
  <rect x="56" y="42" width="10" height="28" fill="white"/>
  <rect x="68" y="42" width="10" height="28" fill="white"/>
  <rect x="80" y="42" width="10" height="28" fill="white"/>
  <!-- Letter cutouts (simplified, dark) -->
  <rect x="12" y="46" width="2" height="20" fill="#1A4A9A"/>
  <rect x="16" y="46" width="2" height="20" fill="#1A4A9A"/>
  <rect x="22" y="46" width="6" height="4" fill="#1A4A9A"/>
  <rect x="22" y="56" width="6" height="4" fill="#1A4A9A"/>
  <!-- Kosovo flag star above -->
  <polygon points="50,16 52,24 60,24 54,28 56,36 50,32 44,36 46,28 40,24 48,24" fill="white"/>
  <!-- Ground shadow base -->
  <rect x="6" y="70" width="88" height="4" fill="white"/>
  <rect x="8" y="74" width="84" height="3" fill="white" opacity="0.4"/>
