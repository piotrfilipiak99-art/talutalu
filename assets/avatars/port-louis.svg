<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#00568A"/>
  <!-- Aapravasi Ghat (Immigration Depot), Port Louis — UNESCO World Heritage Site -->
  <!-- First landing place of indentured labourers, colonial stone building on waterfront -->
  <!-- Stone immigration building (warehouse/depot style) -->
  <rect x="12" y="46" width="76" height="34" fill="white"/>
  <!-- Gabled roof section (main hall) -->
  <polygon points="20,46 50,26 80,46" fill="white"/>
  <!-- Roof line detail -->
  <rect x="18" y="42" width="64" height="6" fill="white"/>
  <!-- Row of arched openings (the iconic archways) -->
  <rect x="16" y="56" width="10" height="22" fill="#00568A" opacity="0.4"/>
  <ellipse cx="21" cy="56" rx="5" ry="5" fill="#00568A" opacity="0.4"/>
  <rect x="30" y="56" width="10" height="22" fill="#00568A" opacity="0.4"/>
  <ellipse cx="35" cy="56" rx="5" ry="5" fill="#00568A" opacity="0.4"/>
  <rect x="44" y="56" width="10" height="22" fill="#00568A" opacity="0.4"/>
  <ellipse cx="49" cy="56" rx="5" ry="5" fill="#00568A" opacity="0.4"/>
  <rect x="58" y="56" width="10" height="22" fill="#00568A" opacity="0.4"/>
  <ellipse cx="63" cy="56" rx="5" ry="5" fill="#00568A" opacity="0.4"/>
  <rect x="72" y="56" width="10" height="22" fill="#00568A" opacity="0.4"/>
  <ellipse cx="77" cy="56" rx="5" ry="5" fill="#00568A" opacity="0.4"/>
  <!-- Flagpole on roof -->
  <rect x="48" y="22" width="4" height="22" fill="white"/>
  <!-- Port Louis harbour waterfront -->
  <rect x="8" y="82" width="84" height="8" fill="white" opacity="0.2"/>
  <!-- Stone quay/steps down to water -->
  <rect x="16" y="80" width="68" height="4" fill="white" opacity="0.4"/>
</svg>
