<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#2A4A2A"/>
  <!-- Casemates du Bock / Luxembourg fortress on cliffs -->
  <!-- Cliff face -->
  <rect x="10" y="60" width="80" height="22" fill="white" opacity="0.4"/>
  <!-- Cliff top fortification walls -->
  <rect x="14" y="44" width="72" height="18" fill="white"/>
  <!-- Merlons along wall -->
  <rect x="14" y="38" width="5" height="6" fill="white"/>
  <rect x="22" y="38" width="5" height="6" fill="white"/>
  <rect x="30" y="38" width="5" height="6" fill="white"/>
  <rect x="38" y="38" width="5" height="6" fill="white"/>
  <rect x="46" y="38" width="5" height="6" fill="white"/>
  <rect x="54" y="38" width="5" height="6" fill="white"/>
  <rect x="62" y="38" width="5" height="6" fill="white"/>
  <rect x="70" y="38" width="5" height="6" fill="white"/>
  <rect x="78" y="38" width="5" height="6" fill="white"/>
  <!-- Bock tower -->
  <rect x="62" y="18" width="16" height="28" fill="white"/>
  <polygon points="62,18 78,18 70,6" fill="white"/>
  <!-- Cathedral spires visible above walls -->
  <polygon points="22,38 28,38 25,20" fill="white"/>
  <polygon points="32,38 38,38 35,24" fill="white"/>
  <!-- Adolphe Bridge arch hint at base -->
  <path d="M10,68 Q50,48 90,68" stroke="white" stroke-width="4" fill="none"/>
</svg>
