<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#1A5A8A"/>
  <!-- National Congress, Brasília (Oscar Niemeyer) -->
  <!-- Twin towers (Congress towers) -->
  <rect x="40" y="18" width="8" height="58" fill="white"/>
  <rect x="52" y="18" width="8" height="58" fill="white"/>
  <!-- Chamber of Deputies (bowl - open upward) -->
  <path d="M16,64 Q20,52 36,50 Q36,50 36,76 L16,76Z" fill="white"/>
  <ellipse cx="26" cy="54" rx="12" ry="6" fill="white"/>
  <!-- Senate (dome - closed) -->
  <rect x="64" y="58" width="26" height="18" fill="white"/>
  <ellipse cx="77" cy="58" rx="13" ry="8" fill="white"/>
  <!-- Esplanade (flat platform) -->
  <rect x="10" y="76" width="80" height="4" fill="white"/>
  <!-- Reflecting pool -->
  <rect x="10" y="80" width="80" height="6" fill="white" opacity="0.25"/>
  <!-- Sky -->
  <rect x="30" y="14" width="4" height="4" fill="white"/>
  <rect x="66" y="14" width="4" height="4" fill="white"/>
</svg>
