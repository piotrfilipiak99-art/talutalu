<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#2A4A9A"/>
  <!-- Hallgrímskirkja church -->
  <!-- Main tall spire -->
  <polygon points="42,14 58,14 62,60 38,60" fill="white"/>
  <!-- Spire tip -->
  <polygon points="46,14 54,14 50,4" fill="white"/>
  <!-- Side colonnades (step-like) -->
  <polygon points="22,60 38,60 34,30 24,38" fill="white"/>
  <polygon points="78,60 62,60 66,30 76,38" fill="white"/>
  <!-- Outer wings -->
  <polygon points="12,60 24,60 24,50 16,54" fill="white"/>
  <polygon points="88,60 76,60 76,50 84,54" fill="white"/>
  <!-- Main facade -->
  <rect x="38" y="58" width="24" height="4" fill="white"/>
  <!-- Entrance door -->
  <rect x="44" y="64" width="12" height="14" fill="white"/>
  <ellipse cx="50" cy="64" rx="6" ry="5" fill="white"/>
  <rect x="46" y="66" width="8" height="12" fill="#2A4A9A"/>
  <ellipse cx="50" cy="66" rx="4" ry="3" fill="#2A4A9A"/>
  <!-- Base platform -->
  <rect x="16" y="78" width="68" height="4" fill="white"/>
</svg>
