<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#8A6A00"/>
  <!-- Pha That Luang stupa, Vientiane -->
  <!-- Base cloister/wall -->
  <rect x="12" y="72" width="76" height="8" fill="white"/>
  <!-- Lower terrace -->
  <rect x="18" y="65" width="64" height="8" fill="white"/>
  <!-- Upper terrace -->
  <rect x="24" y="58" width="52" height="8" fill="white"/>
  <!-- Main stupa body (bell-shaped) -->
  <polygon points="30,58 70,58 64,30 36,30" fill="white"/>
  <!-- Stupa shoulder rings -->
  <ellipse cx="50" cy="30" rx="16" ry="4" fill="white"/>
  <ellipse cx="50" cy="26" rx="12" ry="3" fill="white"/>
  <ellipse cx="50" cy="22" rx="9" ry="3" fill="white"/>
  <!-- Harmika and spire -->
  <rect x="44" y="14" width="12" height="10" fill="white"/>
  <polygon points="44,14 56,14 50,6" fill="white"/>
  <!-- 4 corner small stupas on upper terrace -->
  <polygon points="26,58 34,58 32,44 28,44" fill="white"/>
  <ellipse cx="30" cy="44" rx="4" ry="3" fill="white"/>
  <polygon points="66,58 74,58 72,44 68,44" fill="white"/>
  <ellipse cx="70" cy="44" rx="4" ry="3" fill="white"/>
</svg>
