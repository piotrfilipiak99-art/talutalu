<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#1A6A2A"/>
  <!-- Teatro Nacional (National Theater), San José -->
  <!-- Neoclassical facade -->
  <rect x="14" y="50" width="72" height="30" fill="white"/>
  <!-- Roof balustrade -->
  <rect x="12" y="46" width="76" height="6" fill="white"/>
  <!-- 5 allegorical statues on roof -->
  <rect x="18" y="42" width="4" height="6" fill="white"/>
  <rect x="30" y="40" width="4" height="8" fill="white"/>
  <rect x="48" y="40" width="4" height="8" fill="white"/>
  <rect x="64" y="40" width="4" height="8" fill="white"/>
  <rect x="76" y="42" width="4" height="6" fill="white"/>
  <!-- Ionic columns (6) -->
  <rect x="18" y="50" width="4" height="26" fill="#1A6A2A" opacity="0.35"/>
  <rect x="26" y="50" width="4" height="26" fill="#1A6A2A" opacity="0.35"/>
  <rect x="38" y="50" width="4" height="26" fill="#1A6A2A" opacity="0.35"/>
  <rect x="54" y="50" width="4" height="26" fill="#1A6A2A" opacity="0.35"/>
  <rect x="66" y="50" width="4" height="26" fill="#1A6A2A" opacity="0.35"/>
  <rect x="74" y="50" width="4" height="26" fill="#1A6A2A" opacity="0.35"/>
  <!-- Arched windows on upper floor -->
  <rect x="24" y="54" width="10" height="14" fill="#1A6A2A"/>
  <ellipse cx="29" cy="54" rx="5" ry="4" fill="#1A6A2A"/>
  <rect x="66" y="54" width="10" height="14" fill="#1A6A2A"/>
  <ellipse cx="71" cy="54" rx="5" ry="4" fill="#1A6A2A"/>
  <!-- Central entrance (3 arched doors) -->
  <rect x="38" y="62" width="8" height="18" fill="#1A6A2A"/>
  <ellipse cx="42" cy="62" rx="4" ry="4" fill="#1A6A2A"/>
  <rect x="50" y="62" width="8" height="18" fill="#1A6A2A"/>
  <ellipse cx="54" cy="62" rx="4" ry="4" fill="#1A6A2A"/>
  <!-- Steps -->
  <rect x="10" y="80" width="80" height="3" fill="white"/>
  <rect x="6" y="83" width="88" height="3" fill="white"/>
</svg>
