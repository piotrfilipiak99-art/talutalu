<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#4A1A00"/>
  <!-- Notre-Dame de Bangui Cathedral, Central African Republic -->
  <!-- Two towers flanking nave (French colonial Gothic style) -->
  <!-- Left tower -->
  <rect x="10" y="28" width="22" height="52" fill="white"/>
  <!-- Left tower pointed spire -->
  <polygon points="10,28 32,28 21,8" fill="white"/>
  <!-- Right tower -->
  <rect x="68" y="28" width="22" height="52" fill="white"/>
  <!-- Right tower pointed spire -->
  <polygon points="68,28 90,28 79,8" fill="white"/>
  <!-- Central nave (lower) -->
  <rect x="28" y="44" width="44" height="36" fill="white"/>
  <!-- Central gable -->
  <polygon points="28,44 50,24 72,44" fill="white"/>
  <!-- Rose window in gable -->
  <circle cx="50" cy="38" r="7" fill="#4A1A00" opacity="0.4"/>
  <circle cx="50" cy="38" r="4" fill="white"/>
  <!-- Lancet windows on towers -->
  <rect x="15" y="36" width="6" height="14" fill="#4A1A00" opacity="0.4"/>
  <rect x="23" y="36" width="6" height="14" fill="#4A1A00" opacity="0.4"/>
  <rect x="71" y="36" width="6" height="14" fill="#4A1A00" opacity="0.4"/>
  <rect x="79" y="36" width="6" height="14" fill="#4A1A00" opacity="0.4"/>
  <!-- Main doorway arch -->
  <rect x="40" y="60" width="20" height="20" fill="#4A1A00"/>
  <ellipse cx="50" cy="60" rx="10" ry="8" fill="#4A1A00"/>
  <!-- Steps -->
  <rect x="28" y="80" width="44" height="3" fill="white"/>
  <rect x="22" y="83" width="56" height="3" fill="white"/>
</svg>
