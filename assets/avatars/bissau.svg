<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#8A6A00"/>
  <!-- Pidjiguiti Memorial, Bissau — dock massacre memorial + independence symbol -->
  <!-- Stylized dock/pier structure with memorial monument -->
  <!-- Monument column -->
  <rect x="44" y="18" width="12" height="52" fill="white"/>
  <!-- Monument capital/top -->
  <rect x="38" y="14" width="24" height="8" fill="white"/>
  <rect x="34" y="10" width="32" height="6" fill="white"/>
  <!-- Flame/torch on monument -->
  <path d="M 46,10 Q 44,4 50,2 Q 56,4 54,10 Z" fill="white"/>
  <!-- Guinea-Bissau star on column -->
  <polygon points="50,42 52,48 58,48 53,52 55,58 50,54 45,58 47,52 42,48 48,48" fill="#8A6A00" opacity="0.4"/>
  <!-- Wide base plinth -->
  <rect x="34" y="70" width="32" height="6" fill="white"/>
  <rect x="28" y="76" width="44" height="5" fill="white"/>
  <rect x="20" y="81" width="60" height="4" fill="white"/>
  <!-- Harbor/dock at bottom (Pidjiguiti docks) -->
  <rect x="8" y="88" width="84" height="6" fill="white" opacity="0.2"/>
  <!-- Dock bollards -->
  <rect x="16" y="84" width="4" height="6" fill="white"/>
  <rect x="30" y="84" width="4" height="6" fill="white"/>
  <rect x="66" y="84" width="4" height="6" fill="white"/>
  <rect x="80" y="84" width="4" height="6" fill="white"/>
</svg>
