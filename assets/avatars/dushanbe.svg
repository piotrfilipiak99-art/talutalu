<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#1A4A6A"/>
  <!-- Ismoil Somoni Monument, Dushanbe - tall column with equestrian statue -->
  <!-- Tall column / shaft -->
  <rect x="44" y="26" width="12" height="56" fill="white"/>
  <!-- Column capital -->
  <rect x="40" y="22" width="20" height="6" fill="white"/>
  <!-- Horse and rider on top -->
  <ellipse cx="50" cy="16" rx="14" ry="7" fill="white"/>
  <!-- Horse head -->
  <circle cx="62" cy="12" r="5" fill="white"/>
  <!-- Horse legs -->
  <rect x="40" y="20" width="3" height="8" fill="white"/>
  <rect x="46" y="21" width="3" height="7" fill="white"/>
  <rect x="56" y="21" width="3" height="7" fill="white"/>
  <rect x="62" y="21" width="3" height="6" fill="white"/>
  <!-- Rider upper body -->
  <rect x="46" y="8" width="8" height="10" fill="white"/>
  <circle cx="50" cy="6" r="4" fill="white"/>
  <!-- Base pedestal (3 steps wide) -->
  <rect x="30" y="82" width="40" height="5" fill="white"/>
  <rect x="24" y="87" width="52" height="4" fill="white"/>
  <!-- Pamir mountains hint -->
  <polygon points="10,70 26,40 42,60 58,36 74,54 90,70" fill="white" opacity="0.15"/>
</svg>
