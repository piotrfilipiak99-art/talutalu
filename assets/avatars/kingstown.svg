<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#2A5A1A"/>
  <!-- La Soufrière volcano + Fort Charlotte, Kingstown, St. Vincent -->
  <!-- La Soufrière volcano (active) -->
  <polygon points="10,76 50,18 90,76" fill="white" opacity="0.35"/>
  <!-- Volcanic crater hint (dark at summit) -->
  <ellipse cx="50" cy="22" rx="8" ry="4" fill="#2A5A1A" opacity="0.5"/>
  <!-- Steam/smoke from volcano -->
  <ellipse cx="50" cy="14" rx="6" ry="8" fill="white" opacity="0.3"/>
  <!-- Fort Charlotte on the promontory (left) -->
  <rect x="8" y="50" width="22" height="18" fill="white"/>
  <!-- Fort walls merlons -->
  <rect x="8" y="44" width="4" height="6" fill="white"/>
  <rect x="14" y="44" width="4" height="6" fill="white"/>
  <rect x="20" y="44" width="4" height="6" fill="white"/>
  <rect x="26" y="44" width="4" height="6" fill="white"/>
  <!-- Cannon embrasures -->
  <rect x="12" y="54" width="4" height="6" fill="#2A5A1A"/>
  <rect x="20" y="54" width="4" height="6" fill="#2A5A1A"/>
  <!-- Kingstown harbor -->
  <rect x="10" y="76" width="80" height="12" fill="white" opacity="0.25"/>
  <rect x="10" y="76" width="80" height="3" fill="white"/>
  <!-- Lush hills (Saint Vincent's green) -->
  <ellipse cx="72" cy="62" rx="18" ry="14" fill="white" opacity="0.2"/>
</svg>
