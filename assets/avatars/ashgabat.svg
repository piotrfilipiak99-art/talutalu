<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#3A5A6A"/>
  <!-- Arch of Neutrality / Monument to Turkmenbashy, Ashgabat -->
  <!-- Three-legged arch (tripod structure) -->
  <!-- Left leg -->
  <polygon points="16,82 28,82 44,34 36,30" fill="white"/>
  <!-- Right leg -->
  <polygon points="72,82 84,82 64,30 56,34" fill="white"/>
  <!-- Back leg (center) -->
  <rect x="46" y="34" width="8" height="48" fill="white"/>
  <!-- Connection at top -->
  <ellipse cx="50" cy="32" rx="18" ry="6" fill="white"/>
  <!-- Rotating golden statue of Turkmenbashi at top -->
  <!-- Simplified as star/figure on globe -->
  <circle cx="50" cy="22" r="10" fill="white"/>
  <circle cx="50" cy="22" r="7" fill="#3A5A6A" opacity="0.4"/>
  <!-- Figure on top -->
  <rect x="47" y="10" width="6" height="12" fill="white"/>
  <circle cx="50" cy="8" r="4" fill="white"/>
  <!-- Arms spread -->
  <rect x="38" y="12" width="24" height="3" fill="white"/>
  <!-- White marble city blocks -->
  <rect x="8" y="78" width="18" height="6" fill="white" opacity="0.5"/>
  <rect x="74" y="76" width="18" height="8" fill="white" opacity="0.5"/>
  <!-- Base platform -->
  <rect x="14" y="82" width="72" height="4" fill="white"/>
</svg>
