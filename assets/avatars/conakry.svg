<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#8A0000"/>
  <!-- Grand Mosque of Conakry, Guinea — one of the largest mosques in West Africa -->
  <!-- Main dome -->
  <ellipse cx="50" cy="44" rx="24" ry="20" fill="white"/>
  <!-- Drum below dome -->
  <rect x="28" y="54" width="44" height="8" fill="white"/>
  <!-- Lantern finial -->
  <rect x="44" y="22" width="12" height="12" fill="white"/>
  <ellipse cx="50" cy="22" rx="7" ry="5" fill="white"/>
  <!-- Crescent on top -->
  <circle cx="50" cy="16" r="4" fill="#8A0000"/>
  <circle cx="52" cy="15" r="3.5" fill="white"/>
  <!-- Prayer hall -->
  <rect x="14" y="62" width="72" height="18" fill="white"/>
  <!-- 4 minarets (one at each corner) -->
  <rect x="8" y="32" width="10" height="50" fill="white"/>
  <polygon points="8,32 18,32 13,18" fill="white"/>
  <circle cx="13" cy="17" r="2.5" fill="#8A0000"/>
  <circle cx="14" cy="16.5" r="2" fill="white"/>
  <rect x="82" y="32" width="10" height="50" fill="white"/>
  <polygon points="82,32 92,32 87,18" fill="white"/>
  <circle cx="87" cy="17" r="2.5" fill="#8A0000"/>
  <circle cx="88" cy="16.5" r="2" fill="white"/>
  <!-- Inner minarets -->
  <rect x="18" y="42" width="8" height="40" fill="white"/>
  <polygon points="18,42 26,42 22,32" fill="white"/>
  <rect x="74" y="42" width="8" height="40" fill="white"/>
  <polygon points="74,42 82,42 78,32" fill="white"/>
  <!-- Arched entrance -->
  <rect x="41" y="64" width="18" height="16" fill="#8A0000"/>
  <ellipse cx="50" cy="64" rx="9" ry="8" fill="#8A0000"/>
  <!-- Base -->
  <rect x="10" y="80" width="80" height="5" fill="white"/>
</svg>
