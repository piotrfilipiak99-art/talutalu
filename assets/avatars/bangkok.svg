<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#1A6A4A"/>
  <!-- Wat Arun (Temple of Dawn), Bangkok -->
  <!-- Central prang (tower) -->
  <polygon points="40,78 60,78 56,18 44,18" fill="white"/>
  <!-- Prang tiers (horizontal rings) -->
  <rect x="38" y="28" width="24" height="4" fill="white"/>
  <rect x="36" y="38" width="28" height="4" fill="white"/>
  <rect x="34" y="50" width="32" height="4" fill="white"/>
  <rect x="32" y="62" width="36" height="4" fill="white"/>
  <!-- Top spire -->
  <polygon points="46,18 54,18 50,6" fill="white"/>
  <!-- 4 smaller corner prangs -->
  <polygon points="22,78 32,78 30,50 24,50" fill="white"/>
  <polygon points="68,78 78,78 76,50 70,50" fill="white"/>
  <polygon points="28,60 36,60 35,40 29,40" fill="white"/>
  <polygon points="64,60 72,60 71,40 65,40" fill="white"/>
  <!-- Base terrace -->
  <rect x="16" y="78" width="68" height="4" fill="white"/>
  <!-- River hint -->
  <rect x="10" y="82" width="80" height="4" fill="white" opacity="0.3"/>
</svg>
