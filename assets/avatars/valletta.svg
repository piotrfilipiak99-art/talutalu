<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#8A4A00"/>
  <!-- St. John's Co-Cathedral & Valletta fortifications -->
  <!-- Cathedral twin towers -->
  <rect x="28" y="28" width="12" height="48" fill="white"/>
  <rect x="60" y="28" width="12" height="48" fill="white"/>
  <polygon points="28,28 40,28 34,14" fill="white"/>
  <polygon points="60,28 72,28 66,14" fill="white"/>
  <!-- Nave -->
  <rect x="36" y="46" width="28" height="30" fill="white"/>
  <!-- Facade between towers -->
  <rect x="38" y="42" width="24" height="8" fill="white"/>
  <!-- Bastions (sea walls) - characteristic angled walls -->
  <polygon points="10,76 18,60 28,76" fill="white"/>
  <polygon points="90,76 82,60 72,76" fill="white"/>
  <!-- Waterfront base -->
  <rect x="10" y="76" width="80" height="6" fill="white"/>
  <!-- Sea hint -->
  <rect x="10" y="82" width="80" height="4" fill="white" opacity="0.3"/>
  <!-- Portal entrance -->
  <rect x="44" y="62" width="12" height="14" fill="#8A4A00"/>
  <ellipse cx="50" cy="62" rx="6" ry="5" fill="#8A4A00"/>
</svg>
