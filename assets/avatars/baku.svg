  <!-- Right flame tower -->
  <path d="M72,80 Q66,50 70,28 Q72,14 78,28 Q82,50 82,80Z" fill="white"/>
  <!-- Flame tips glow hint -->
  <ellipse cx="26" cy="22" rx="6" ry="10" fill="white" opacity="0.4"/>
  <ellipse cx="50" cy="12" rx="8" ry="12" fill="white" opacity="0.4"/>
  <ellipse cx="74" cy="22" rx="6" ry="10" fill="white" opacity="0.4"/>
  <!-- Caspian Sea waterfront base -->
  <rect x="10" y="80" width="80" height="5" fill="white" opacity="0.35"/>
  <rect x="10" y="80" width="80" height="2" fill="white"/>
</svg>
