<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#1A5CB0"/>
  <!-- Helsinki Cathedral -->
  <!-- Main dome -->
  <ellipse cx="50" cy="40" rx="16" ry="18" fill="white"/>
  <!-- Dome lantern -->
  <rect x="46" y="20" width="8" height="10" fill="white"/>
  <ellipse cx="50" cy="20" rx="4" ry="3" fill="white"/>
  <rect x="48" y="14" width="4" height="6" fill="white"/>
  <!-- Main staircase body -->
  <rect x="26" y="56" width="48" height="8" fill="white"/>
  <rect x="18" y="64" width="64" height="6" fill="white"/>
  <rect x="12" y="70" width="76" height="6" fill="white"/>
  <!-- 4 smaller corner towers -->
  <rect x="18" y="44" width="10" height="16" fill="white"/>
  <ellipse cx="23" cy="44" rx="5" ry="4" fill="white"/>
  <rect x="72" y="44" width="10" height="16" fill="white"/>
  <ellipse cx="77" cy="44" rx="5" ry="4" fill="white"/>
  <!-- Columns under dome -->
  <rect x="30" y="52" width="4" height="8" fill="white"/>
  <rect x="38" y="52" width="4" height="8" fill="white"/>
  <rect x="58" y="52" width="4" height="8" fill="white"/>
  <rect x="66" y="52" width="4" height="8" fill="white"/>
</svg>
