<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#1A4A00"/>
  <!-- Parliament Building, Lilongwe — Malawi's distinctive modernist parliament -->
  <!-- Main chamber dome -->
  <ellipse cx="50" cy="46" rx="26" ry="20" fill="white"/>
  <rect x="26" y="54" width="48" height="6" fill="white"/>
  <!-- Drum/cylinder base of dome -->
  <rect x="30" y="48" width="40" height="10" fill="white"/>
  <!-- Lantern on dome -->
  <rect x="44" y="26" width="12" height="14" fill="white"/>
  <ellipse cx="50" cy="26" rx="7" ry="5" fill="white"/>
  <!-- Flagpole -->
  <rect x="48" y="12" width="4" height="18" fill="white"/>
  <!-- Main parliament wing - left -->
  <rect x="8" y="58" width="34" height="24" fill="white"/>
  <!-- Portico/colonnade left -->
  <rect x="10" y="58" width="4" height="20" fill="#1A4A00" opacity="0.3"/>
  <rect x="18" y="58" width="4" height="20" fill="#1A4A00" opacity="0.3"/>
  <rect x="26" y="58" width="4" height="20" fill="#1A4A00" opacity="0.3"/>
  <rect x="34" y="58" width="4" height="20" fill="#1A4A00" opacity="0.3"/>
  <!-- Main parliament wing - right -->
  <rect x="58" y="58" width="34" height="24" fill="white"/>
  <rect x="60" y="58" width="4" height="20" fill="#1A4A00" opacity="0.3"/>
  <rect x="68" y="58" width="4" height="20" fill="#1A4A00" opacity="0.3"/>
  <rect x="76" y="58" width="4" height="20" fill="#1A4A00" opacity="0.3"/>
  <rect x="84" y="58" width="4" height="20" fill="#1A4A00" opacity="0.3"/>
  <!-- Entrance steps -->
  <rect x="36" y="80" width="28" height="4" fill="white"/>
  <rect x="30" y="84" width="40" height="4" fill="white"/>
  <rect x="24" y="88" width="52" height="4" fill="white" opacity="0.5"/>
</svg>
