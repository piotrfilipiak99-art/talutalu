<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#005A3A"/>
  <!-- Palau Capitol Complex, Ngerulmud — modern capitol with tall dome (world's least-populated capital) -->
  <!-- Inspired by the US Capitol but tropical/modernist -->
  <!-- Central dome -->
  <ellipse cx="50" cy="40" rx="20" ry="18" fill="white"/>
  <rect x="32" y="50" width="36" height="6" fill="white"/>
  <!-- Lantern -->
  <rect x="44" y="20" width="12" height="14" fill="white"/>
  <ellipse cx="50" cy="20" rx="7" ry="5" fill="white"/>
  <!-- Flagpole -->
  <rect x="48" y="8" width="4" height="16" fill="white"/>
  <!-- Left wing -->
  <rect x="8" y="54" width="34" height="24" fill="white"/>
  <!-- Left colonnade -->
  <rect x="10" y="54" width="4" height="20" fill="#005A3A" opacity="0.3"/>
  <rect x="18" y="54" width="4" height="20" fill="#005A3A" opacity="0.3"/>
  <rect x="26" y="54" width="4" height="20" fill="#005A3A" opacity="0.3"/>
  <rect x="34" y="54" width="4" height="20" fill="#005A3A" opacity="0.3"/>
  <!-- Right wing -->
  <rect x="58" y="54" width="34" height="24" fill="white"/>
  <rect x="60" y="54" width="4" height="20" fill="#005A3A" opacity="0.3"/>
  <rect x="68" y="54" width="4" height="20" fill="#005A3A" opacity="0.3"/>
  <rect x="76" y="54" width="4" height="20" fill="#005A3A" opacity="0.3"/>
  <rect x="84" y="54" width="4" height="20" fill="#005A3A" opacity="0.3"/>
  <!-- Rock islands of Palau (jungle hills in background) -->
  <ellipse cx="20" cy="82" rx="14" ry="8" fill="white" opacity="0.25"/>
  <ellipse cx="80" cy="82" rx="14" ry="8" fill="white" opacity="0.25"/>
  <!-- Steps -->
  <rect x="30" y="78" width="40" height="3" fill="white"/>
  <rect x="22" y="81" width="56" height="3" fill="white"/>
</svg>
