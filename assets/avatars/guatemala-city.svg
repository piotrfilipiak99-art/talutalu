<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#1A5A2A"/>
  <!-- Palacio Nacional, Guatemala City (turquoise Art Deco-Neo Renaissance) -->
  <!-- Main central tower -->
  <rect x="38" y="20" width="24" height="56" fill="white"/>
  <!-- Tower dome -->
  <ellipse cx="50" cy="20" rx="14" ry="8" fill="white"/>
  <polygon points="40,14 60,14 50,4" fill="white"/>
  <!-- Flanking wings -->
  <rect x="10" y="40" width="30" height="36" fill="white"/>
  <rect x="60" y="40" width="30" height="36" fill="white"/>
  <!-- Wing roof cornices -->
  <rect x="8" y="36" width="34" height="6" fill="white"/>
  <rect x="58" y="36" width="34" height="6" fill="white"/>
  <!-- Arched arcade on wings -->
  <rect x="14" y="52" width="8" height="18" fill="#1A5A2A"/>
  <ellipse cx="18" cy="52" rx="4" ry="4" fill="#1A5A2A"/>
  <rect x="28" y="52" width="8" height="18" fill="#1A5A2A"/>
  <ellipse cx="32" cy="52" rx="4" ry="4" fill="#1A5A2A"/>
  <rect x="64" y="52" width="8" height="18" fill="#1A5A2A"/>
  <ellipse cx="68" cy="52" rx="4" ry="4" fill="#1A5A2A"/>
  <rect x="78" y="52" width="8" height="18" fill="#1A5A2A"/>
  <ellipse cx="82" cy="52" rx="4" ry="4" fill="#1A5A2A"/>
  <!-- Central entrance arch -->
  <rect x="42" y="58" width="16" height="18" fill="#1A5A2A"/>
  <ellipse cx="50" cy="58" rx="8" ry="6" fill="#1A5A2A"/>
  <!-- Plaza de la Constitución -->
  <rect x="8" y="76" width="84" height="4" fill="white"/>
  <!-- Volcanoes in background -->
  <polygon points="10,76 22,46 34,76" fill="white" opacity="0.12"/>
  <polygon points="66,76 78,46 90,76" fill="white" opacity="0.12"/>
</svg>
