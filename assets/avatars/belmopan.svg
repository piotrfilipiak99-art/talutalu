<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#1A5A2A"/>
  <!-- National Assembly of Belize, Belmopan - Mayan-inspired modern architecture -->
  <!-- Main building (flat-roofed, Mayan stepped style) -->
  <rect x="14" y="52" width="72" height="26" fill="white"/>
  <!-- Upper tier (stepped like Mayan pyramid) -->
  <rect x="20" y="40" width="60" height="14" fill="white"/>
  <!-- Second tier -->
  <rect x="26" y="30" width="48" height="12" fill="white"/>
  <!-- Top platform (pyramid-esque) -->
  <rect x="32" y="22" width="36" height="10" fill="white"/>
  <!-- Mayan geometric frieze (simplified pattern) -->
  <rect x="14" y="68" width="72" height="4" fill="#1A5A2A" opacity="0.3"/>
  <rect x="20" y="50" width="60" height="3" fill="#1A5A2A" opacity="0.3"/>
  <!-- Flagpole -->
  <rect x="48" y="10" width="4" height="12" fill="white"/>
  <polygon points="52,10 64,14 52,18" fill="white"/>
  <!-- Entrance columns -->
  <rect x="36" y="56" width="4" height="20" fill="#1A5A2A" opacity="0.4"/>
  <rect x="44" y="56" width="4" height="20" fill="#1A5A2A" opacity="0.4"/>
  <rect x="52" y="56" width="4" height="20" fill="#1A5A2A" opacity="0.4"/>
  <rect x="60" y="56" width="4" height="20" fill="#1A5A2A" opacity="0.4"/>
  <!-- Rainforest hills (Belize's countryside) -->
  <ellipse cx="16" cy="58" rx="12" ry="10" fill="white" opacity="0.1"/>
  <ellipse cx="84" cy="58" rx="12" ry="10" fill="white" opacity="0.1"/>
  <!-- Base -->
  <rect x="10" y="78" width="80" height="4" fill="white"/>
</svg>
