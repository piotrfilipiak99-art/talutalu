<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#2A3A6A"/>
  <!-- Bahrain World Trade Center (wind turbine towers) -->
  <!-- Left tower (sail-shaped) -->
  <polygon points="24,80 38,80 36,20 26,26" fill="white"/>
  <!-- Right tower (mirror sail) -->
  <polygon points="62,80 76,80 74,26 64,20" fill="white"/>
  <!-- Three wind turbines between towers -->
  <rect x="38" y="34" width="24" height="2" fill="white"/>
  <circle cx="50" cy="35" r="3" fill="white"/>
  <rect x="38" y="50" width="24" height="2" fill="white"/>
  <circle cx="50" cy="51" r="3" fill="white"/>
  <rect x="38" y="64" width="24" height="2" fill="white"/>
  <circle cx="50" cy="65" r="3" fill="white"/>
  <!-- Turbine blades -->
  <polygon points="50,32 44,28 46,35" fill="white"/>
  <polygon points="50,32 56,28 54,35" fill="white"/>
  <polygon points="50,48 44,44 46,51" fill="white"/>
  <polygon points="50,48 56,44 54,51" fill="white"/>
  <polygon points="50,62 44,58 46,65" fill="white"/>
  <polygon points="50,62 56,58 54,65" fill="white"/>
  <!-- Base / podium -->
  <rect x="18" y="80" width="64" height="4" fill="white"/>
  <!-- Persian Gulf water -->
  <rect x="10" y="84" width="80" height="6" fill="white" opacity="0.25"/>
</svg>
