<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#4A6A8A"/>
  <!-- Arba'a Rukun Mosque (Mosque of the Four Pillars), Mogadishu — oldest mosque in Somalia -->
  <!-- Arab-Somali medieval architecture -->
  <!-- Main mosque building -->
  <rect x="18" y="46" width="64" height="34" fill="white"/>
  <!-- Flat top parapet -->
  <rect x="16" y="40" width="68" height="10" fill="white"/>
  <!-- Crenellations on parapet -->
  <rect x="16" y="32" width="10" height="10" fill="white"/>
  <rect x="30" y="32" width="10" height="10" fill="white"/>
  <rect x="60" y="32" width="10" height="10" fill="white"/>
  <rect x="74" y="32" width="10" height="10" fill="white"/>
  <!-- Thin octagonal minaret (Somali style) -->
  <rect x="40" y="10" width="20" height="38" fill="white"/>
  <!-- Minaret neck/balcony -->
  <rect x="36" y="20" width="28" height="4" fill="white"/>
  <rect x="38" y="32" width="24" height="4" fill="white"/>
  <!-- Conical minaret top -->
  <polygon points="36,10 50,2 64,10" fill="white"/>
  <!-- Crescent finial -->
  <circle cx="50" cy="2" r="2.5" fill="#4A6A8A"/>
  <circle cx="51.5" cy="1.5" r="2" fill="white"/>
  <!-- Four characteristic pillars (the "Arba'a Rukun") visible as columns -->
  <rect x="20" y="54" width="5" height="24" fill="#4A6A8A" opacity="0.3"/>
  <rect x="32" y="54" width="5" height="24" fill="#4A6A8A" opacity="0.3"/>
  <rect x="63" y="54" width="5" height="24" fill="#4A6A8A" opacity="0.3"/>
  <rect x="75" y="54" width="5" height="24" fill="#4A6A8A" opacity="0.3"/>
  <!-- Arched doorway -->
  <rect x="42" y="60" width="16" height="20" fill="#4A6A8A"/>
  <ellipse cx="50" cy="60" rx="8" ry="7" fill="#4A6A8A"/>
  <!-- Indian Ocean backdrop -->
  <rect x="8" y="84" width="84" height="8" fill="white" opacity="0.15"/>
</svg>
