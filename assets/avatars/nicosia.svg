<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#1A5C8A"/>
  <!-- Selimiye Mosque (former St. Sophia Cathedral), Nicosia -->
  <!-- Gothic twin towers with minaret added -->
  <rect x="26" y="26" width="14" height="50" fill="white"/>
  <rect x="60" y="26" width="14" height="50" fill="white"/>
  <polygon points="26,26 40,26 33,12" fill="white"/>
  <polygon points="60,26 74,26 67,12" fill="white"/>
  <!-- Nave between towers -->
  <rect x="36" y="44" width="28" height="32" fill="white"/>
  <!-- Gothic rose window -->
  <circle cx="50" cy="52" r="8" fill="#1A5C8A"/>
  <circle cx="50" cy="52" r="6" fill="white" opacity="0.2"/>
  <!-- Ottoman minaret on left tower (added later) -->
  <rect x="24" y="6" width="6" height="22" fill="white"/>
  <polygon points="24,6 30,6 27,0" fill="white"/>
  <rect x="22" y="14" width="10" height="2" fill="white"/>
  <!-- Door -->
  <rect x="44" y="64" width="12" height="12" fill="#1A5C8A"/>
  <ellipse cx="50" cy="64" rx="6" ry="5" fill="#1A5C8A"/>
  <!-- Base -->
  <rect x="20" y="76" width="60" height="4" fill="white"/>
</svg>
