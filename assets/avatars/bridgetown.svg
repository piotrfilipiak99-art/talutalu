<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#1A3A7A"/>
  <!-- Bridgetown Garrison / Parliament Buildings, Barbados -->
  <!-- Main Parliament building (neo-Gothic) -->
  <rect x="14" y="48" width="72" height="30" fill="white"/>
  <!-- Central clock tower -->
  <rect x="40" y="22" width="20" height="30" fill="white"/>
  <!-- Tower spire -->
  <polygon points="40,22 60,22 50,8" fill="white"/>
  <!-- Clock face -->
  <circle cx="50" cy="36" r="7" fill="#1A3A7A"/>
  <circle cx="50" cy="36" r="5" fill="white" opacity="0.2"/>
  <!-- Gothic windows on wings -->
  <rect x="18" y="56" width="8" height="14" fill="#1A3A7A"/>
  <polygon points="18,56 26,56 22,50" fill="#1A3A7A"/>
  <rect x="74" y="56" width="8" height="14" fill="#1A3A7A"/>
  <polygon points="74,56 82,56 78,50" fill="#1A3A7A"/>
  <rect x="36" y="56" width="10" height="18" fill="#1A3A7A"/>
  <polygon points="36,56 46,56 41,48" fill="#1A3A7A"/>
  <rect x="54" y="56" width="10" height="18" fill="#1A3A7A"/>
  <polygon points="54,56 64,56 59,48" fill="#1A3A7A"/>
  <!-- Decorative roofline with finials -->
  <rect x="12" y="44" width="76" height="6" fill="white"/>
  <ellipse cx="20" cy="42" rx="3" ry="4" fill="white"/>
  <ellipse cx="50" cy="42" rx="3" ry="4" fill="white"/>
  <ellipse cx="80" cy="42" rx="3" ry="4" fill="white"/>
  <!-- Base -->
  <rect x="10" y="78" width="80" height="4" fill="white"/>
  <!-- Caribbean sea -->
  <rect x="10" y="82" width="80" height="5" fill="white" opacity="0.2"/>
</svg>
