<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#8A5A00"/>
  <!-- Dome of the Rock, Jerusalem -->
  <!-- Drum (octagonal walls - simplified as rectangle) -->
  <rect x="22" y="56" width="56" height="14" fill="white"/>
  <!-- Main dome (golden) -->
  <ellipse cx="50" cy="44" rx="22" ry="18" fill="white"/>
  <!-- Drum below dome -->
  <rect x="30" y="54" width="40" height="6" fill="white"/>
  <!-- Crescent on dome -->
  <circle cx="50" cy="26" r="5" fill="#8A5A00"/>
  <circle cx="54" cy="24" r="4" fill="white"/>
  <rect x="49" y="20" width="2" height="6" fill="white"/>
  <!-- Arched arcade around drum -->
  <rect x="24" y="58" width="8" height="10" fill="#8A5A00"/>
  <ellipse cx="28" cy="58" rx="4" ry="3" fill="#8A5A00"/>
  <rect x="46" y="58" width="8" height="10" fill="#8A5A00"/>
  <ellipse cx="50" cy="58" rx="4" ry="3" fill="#8A5A00"/>
  <rect x="68" y="58" width="8" height="10" fill="#8A5A00"/>
  <ellipse cx="72" cy="58" rx="4" ry="3" fill="#8A5A00"/>
  <!-- Platform base (Temple Mount) -->
  <rect x="14" y="70" width="72" height="6" fill="white"/>
  <rect x="10" y="76" width="80" height="4" fill="white"/>
  <!-- Western Wall hint -->
  <rect x="14" y="80" width="72" height="4" fill="white" opacity="0.5"/>
</svg>
