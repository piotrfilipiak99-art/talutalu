<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#8A2A00"/>
  <!-- Triumphal Arch of Chișinău -->
  <!-- Two side pylons -->
  <rect x="20" y="40" width="18" height="38" fill="white"/>
  <rect x="62" y="40" width="18" height="38" fill="white"/>
  <!-- Arch connecting pylons -->
  <rect x="20" y="40" width="60" height="12" fill="white"/>
  <!-- Arch opening -->
  <rect x="36" y="46" width="28" height="34" fill="#8A2A00"/>
  <ellipse cx="50" cy="46" rx="14" ry="8" fill="#8A2A00"/>
  <!-- Corinthian capital details on pylons -->
  <rect x="18" y="36" width="22" height="6" fill="white"/>
  <rect x="60" y="36" width="22" height="6" fill="white"/>
  <!-- Attic with bell-tower / cupola on top -->
  <rect x="30" y="28" width="40" height="12" fill="white"/>
  <!-- Cupola -->
  <ellipse cx="50" cy="28" rx="12" ry="8" fill="white"/>
  <rect x="46" y="16" width="8" height="12" fill="white"/>
  <ellipse cx="50" cy="16" rx="4" ry="3" fill="white"/>
  <rect x="48" y="10" width="4" height="6" fill="white"/>
  <!-- Base steps -->
  <rect x="16" y="78" width="68" height="3" fill="white"/>
  <rect x="12" y="81" width="76" height="3" fill="white"/>
</svg>
