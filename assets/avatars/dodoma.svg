<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#1A4A6A"/>
  <!-- Tanzanian Parliament Building, Dodoma — modernist governmental complex -->
  <!-- Main parliament building with central clock tower -->
  <!-- Central tower -->
  <rect x="42" y="20" width="16" height="62" fill="white"/>
  <!-- Tower top -->
  <rect x="38" y="16" width="24" height="8" fill="white"/>
  <polygon points="38,16 50,4 62,16" fill="white"/>
  <!-- Clock face -->
  <circle cx="50" cy="38" r="7" fill="#1A4A6A" opacity="0.4"/>
  <circle cx="50" cy="38" r="4" fill="white"/>
  <!-- Left wing -->
  <rect x="8" y="46" width="36" height="36" fill="white"/>
  <!-- Colonnade on left wing -->
  <rect x="10" y="46" width="4" height="32" fill="#1A4A6A" opacity="0.3"/>
  <rect x="18" y="46" width="4" height="32" fill="#1A4A6A" opacity="0.3"/>
  <rect x="26" y="46" width="4" height="32" fill="#1A4A6A" opacity="0.3"/>
  <rect x="34" y="46" width="4" height="32" fill="#1A4A6A" opacity="0.3"/>
  <!-- Right wing -->
  <rect x="56" y="46" width="36" height="36" fill="white"/>
  <!-- Colonnade on right wing -->
  <rect x="58" y="46" width="4" height="32" fill="#1A4A6A" opacity="0.3"/>
  <rect x="66" y="46" width="4" height="32" fill="#1A4A6A" opacity="0.3"/>
  <rect x="74" y="46" width="4" height="32" fill="#1A4A6A" opacity="0.3"/>
  <rect x="82" y="46" width="4" height="32" fill="#1A4A6A" opacity="0.3"/>
  <!-- Steps -->
  <rect x="30" y="82" width="40" height="3" fill="white"/>
  <rect x="22" y="85" width="56" height="3" fill="white"/>
  <rect x="14" y="88" width="72" height="3" fill="white" opacity="0.4"/>
</svg>
