<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#2A5A3A"/>
  <!-- Manas Monument, Bishkek (epic hero on horse) -->
  <!-- Tian Shan mountains backdrop -->
  <polygon points="10,70 30,36 50,52 70,30 90,70" fill="white" opacity="0.2"/>
  <!-- Horse (rearing up) -->
  <ellipse cx="50" cy="54" rx="18" ry="10" fill="white"/>
  <!-- Rearing front legs -->
  <polygon points="36,54 38,40 44,54" fill="white"/>
  <polygon points="42,54 44,38 50,54" fill="white"/>
  <!-- Horse head (up) -->
  <circle cx="44" cy="36" r="7" fill="white"/>
  <polygon points="38,30 46,26 46,34" fill="white"/>
  <!-- Back legs -->
  <rect x="52" y="54" width="5" height="16" fill="white"/>
  <rect x="60" y="54" width="5" height="14" fill="white"/>
  <!-- Rider (Manas) on horse -->
  <rect x="46" y="42" width="10" height="14" fill="white"/>
  <circle cx="51" cy="38" r="5" fill="white"/>
  <!-- Spear raised -->
  <rect x="55" y="28" width="3" height="20" fill="white"/>
  <polygon points="55,28 58,28 56,20" fill="white"/>
  <!-- Pedestal -->
  <rect x="28" y="70" width="44" height="8" fill="white"/>
  <rect x="22" y="78" width="56" height="5" fill="white"/>
</svg>
