<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#1A4A7A"/>
  <!-- Kuwait Towers (iconic water towers) -->
  <!-- Left tower (two spheres) -->
  <rect x="20" y="36" width="6" height="48" fill="white"/>
  <!-- Lower large sphere -->
  <circle cx="23" cy="56" r="14" fill="white"/>
  <!-- Upper smaller sphere -->
  <circle cx="23" cy="34" r="9" fill="white"/>
  <!-- Tip -->
  <polygon points="20,28 26,28 23,18" fill="white"/>
  <!-- Center tower (two spheres, taller) -->
  <rect x="47" y="24" width="6" height="60" fill="white"/>
  <!-- Lower large sphere -->
  <circle cx="50" cy="52" r="16" fill="white"/>
  <!-- Upper sphere (smaller) -->
  <circle cx="50" cy="28" r="10" fill="white"/>
  <!-- Tip -->
  <polygon points="47,20 53,20 50,8" fill="white"/>
  <!-- Decorative pattern on main sphere -->
  <circle cx="50" cy="52" r="12" fill="#1A4A7A" opacity="0.3"/>
  <!-- Right small single-sphere tower -->
  <rect x="72" y="46" width="5" height="38" fill="white"/>
  <circle cx="74" cy="56" r="10" fill="white"/>
  <polygon points="71,44 77,44 74,34" fill="white"/>
  <!-- Base platform -->
  <rect x="14" y="82" width="72" height="3" fill="white"/>
  <!-- Gulf water hint -->
  <rect x="10" y="85" width="80" height="5" fill="white" opacity="0.25"/>
</svg>
