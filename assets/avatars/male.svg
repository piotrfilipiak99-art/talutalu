<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#007560"/>
  <!-- Hukuru Miskiy (Old Friday Mosque), Malé, Maldives — 17th-century coral stone mosque -->
  <!-- Distinctive stepped pyramid minaret and carved coral walls -->
  <!-- Main mosque building (coral stone, flat-roofed) -->
  <rect x="16" y="50" width="68" height="30" fill="white"/>
  <!-- Flat parapet with stepped crenellations -->
  <rect x="14" y="44" width="72" height="10" fill="white"/>
  <rect x="14" y="36" width="10" height="10" fill="white"/>
  <rect x="28" y="36" width="10" height="10" fill="white"/>
  <rect x="62" y="36" width="10" height="10" fill="white"/>
  <rect x="76" y="36" width="10" height="10" fill="white"/>
  <!-- Stepped pyramid minaret (characteristic of Maldivian mosques) -->
  <!-- Step 1 (widest) -->
  <rect x="34" y="30" width="32" height="12" fill="white"/>
  <!-- Step 2 -->
  <rect x="38" y="20" width="24" height="14" fill="white"/>
  <!-- Step 3 -->
  <rect x="42" y="12" width="16" height="12" fill="white"/>
  <!-- Step 4 (lantern) -->
  <rect x="45" y="6" width="10" height="10" fill="white"/>
  <!-- Finial with crescent -->
  <circle cx="50" cy="5" r="2.5" fill="#007560"/>
  <circle cx="51.5" cy="4.5" r="2" fill="white"/>
  <!-- Carved coral decoration bands on minaret (intricate work) -->
  <rect x="34" y="32" width="32" height="2" fill="#007560" opacity="0.25"/>
  <rect x="38" y="22" width="24" height="2" fill="#007560" opacity="0.25"/>
  <rect x="42" y="14" width="16" height="2" fill="#007560" opacity="0.25"/>
  <!-- Arched doorway -->
  <rect x="42" y="62" width="16" height="18" fill="#007560"/>
  <ellipse cx="50" cy="62" rx="8" ry="7" fill="#007560"/>
  <!-- Carved window grilles -->
  <rect x="18" y="56" width="12" height="10" fill="#007560" opacity="0.4"/>
  <rect x="70" y="56" width="12" height="10" fill="#007560" opacity="0.4"/>
  <!-- Indian Ocean at base -->
  <rect x="10" y="84" width="80" height="6" fill="white" opacity="0.2"/>
</svg>
