<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#1A4A8A"/>
  <!-- Bayterek Tower, Astana (Nur-Sultan) -->
  <!-- Base column -->
  <rect x="44" y="60" width="12" height="24" fill="white"/>
  <!-- Lattice tree trunk -->
  <rect x="46" y="36" width="8" height="26" fill="white"/>
  <!-- Branching supports -->
  <rect x="36" y="48" width="28" height="4" fill="white"/>
  <rect x="38" y="42" width="24" height="4" fill="white"/>
  <!-- Golden egg sphere (nest with egg) -->
  <circle cx="50" cy="30" r="16" fill="white"/>
  <!-- Sphere detail -->
  <ellipse cx="50" cy="30" rx="10" ry="10" fill="#1A4A8A" opacity="0.4"/>
  <!-- Horizon rings on sphere -->
  <ellipse cx="50" cy="30" rx="14" ry="4" fill="white" opacity="0.5"/>
  <!-- Observation deck ring -->
  <rect x="34" y="44" width="32" height="4" fill="white"/>
  <!-- Top finial -->
  <rect x="48" y="14" width="4" height="10" fill="white"/>
  <circle cx="50" cy="13" r="3" fill="white"/>
  <!-- Base plinth -->
  <rect x="32" y="84" width="36" height="4" fill="white"/>
  <rect x="26" y="80" width="48" height="5" fill="white"/>
</svg>
