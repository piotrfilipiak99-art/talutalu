<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#3A5A00"/>
  <!-- Zimbabwe House / Heroes' Acre, Harare — Zimbabwe Bird statue (Great Zimbabwe) -->
  <!-- The Zimbabwe Bird (soapstone bird) — national symbol, from Great Zimbabwe ruins -->
  <!-- Tall pillar/soapstone column -->
  <rect x="44" y="40" width="12" height="44" fill="white"/>
  <!-- Chevron pattern on column (Great Zimbabwe wall pattern) -->
  <path d="M 44,50 L 50,44 L 56,50 L 50,44 Z" fill="#3A5A00" opacity="0.3"/>
  <path d="M 44,62 L 50,56 L 56,62 L 50,56 Z" fill="#3A5A00" opacity="0.3"/>
  <path d="M 44,74 L 50,68 L 56,74 L 50,68 Z" fill="#3A5A00" opacity="0.3"/>
  <!-- Bird body (stylized soapstone bird) -->
  <ellipse cx="50" cy="32" rx="10" ry="8" fill="white"/>
  <!-- Bird head/beak -->
  <circle cx="50" cy="22" r="5" fill="white"/>
  <polygon points="50,20 54,16 53,22" fill="white"/>
  <!-- Wings (spread slightly) -->
  <polygon points="40,30 28,24 36,34" fill="white"/>
  <polygon points="60,30 72,24 64,34" fill="white"/>
  <!-- Tail feathers -->
  <polygon points="44,38 40,48 50,42" fill="white"/>
  <polygon points="56,38 60,48 50,42" fill="white"/>
  <!-- Tall stepped stone plinth (Great Zimbabwe style dry-stone) -->
  <rect x="32" y="82" width="36" height="5" fill="white"/>
  <rect x="24" y="87" width="52" height="4" fill="white"/>
  <rect x="16" y="91" width="68" height="4" fill="white" opacity="0.5"/>
  <!-- Great Zimbabwe stone wall texture (dry-stone) at base -->
  <rect x="24" y="82" width="52" height="2" fill="#3A5A00" opacity="0.2"/>
  <rect x="16" y="84" width="68" height="2" fill="#3A5A00" opacity="0.15"/>
</svg>
